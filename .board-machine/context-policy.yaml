#
# context-policy.yaml — what generated context the dev agent receives and how
# fresh it must be (#140 Board Machine v2). Generated context gives the agent
# the active story, the outcome arc, the version horizon, and nearby future
# dependencies — without allowing silent scope creep.

generated_files:
  # All generated FROM GitHub state; never hand-edited; all gitignored.
  - path: .claude/active-story.md
    generator: scripts/active-story-sync
    injected: every prompt (inject-active-story.sh)
  - path: .claude/outcome-context.md
    generator: scripts/outcome-context
    injected: every prompt (inject-active-story.sh)
  - path: .claude/version-horizon.md
    generator: scripts/version-horizon
    injected: every prompt (inject-active-story.sh)
  - path: target/board/board-inventory.json
    generator: scripts/board-inventory
    injected: never (machine artifact)
  - path: target/board/board-drift.md
    generator: scripts/board-inventory
    injected: on drift (stop-gate)

freshness:
  # Unforced sync inside the TTL is a no-op (no network per keystroke).
  ttl_seconds: 120
  # Hook law: no generated context older than board state. Past max_age the
  # edit guard forces a re-sync before allowing code edits; if the sync cannot
  # run and the cache is this stale, code edits are denied.
  max_age_seconds: 3600

injection:
  # inject-active-story.sh appends these after the active story, in order.
  order: [.claude/active-story.md, .claude/outcome-context.md, .claude/version-horizon.md]
