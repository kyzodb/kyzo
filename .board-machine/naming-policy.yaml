# naming-policy.yaml — board naming law (#140 Board Machine v2).
#
# Milestones are named outcomes. A version number appears in a milestone name
# ONLY when the milestone is release-bearing (outcomes.yaml release_bearing:
# true). board-inventory enforces every rule here.

milestones:
  # A release-bearing milestone name: vX.Y.Z-<outcome>.
  release_bearing_pattern: '^v[0-9]+\.[0-9]+\.[0-9]+-[a-z0-9-]+$'
  # An outcome milestone name: lowercase words joined by hyphens, no digits
  # that read as a version, no temporal buckets, no layer names.
  outcome_pattern: '^[a-z][a-z0-9-]*$'
  # Any of these in a NON-release-bearing milestone name is malformed.
  version_smell_pattern: '(^|[^a-z])v?[0-9]+\.[0-9]+'
  # Retired shapes that must never come back as milestone names.
  forbidden_names:
    - 'Post 0.9.0'
    - 'Product & Platform'

# Stale references: these tokens in an issue BODY point at retired milestone
# vocabulary. Allowed only when the issue is explicitly discussing release
# policy history (history_exempt_issues).
stale_body_tokens:
  - 'Post 0.9.0'
  - 'Product & Platform'
  - '0.9.0-00'
  - '0.9.0-01'
  - '0.9.0-02'
  - '0.9.0-10'
  - '0.9.1-'
  - '0.9.2-'
  - '0.9.3-'
  - '1.3.0-'
  - '1.4.0-'
  - '1.5.0-'
  - '1.6.0-'
  - '1.7.0-'
  - '2.0.0-'

# Forbidden board/dev language (whole words, case-insensitive) in issue titles,
# bodies, milestone names, and labels. Allowed only in prose when the issue
# kind is explicitly strategy/positioning, not implementation.
forbidden_language:
  - wedge
  - kill shot
  - killer
  - moat
  - pitch
  - positioning
  - category
  - go-to-market
  - narrative
  - flex

# Issues whose kind is explicitly strategy/positioning (forbidden_language
# allowed in prose). None exist today.
strategy_issues: []

# Issues that are declared historical artifacts and may retain retired
# vocabulary in their historical content. #137 is the alignment snapshot whose
# header declares "Superseded by outcome milestone reorganization. Historical
# alignment artifact."
history_exempt_issues: [137]
