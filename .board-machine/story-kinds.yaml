#
# story-kinds.yaml — issues are typed work records (#140 Board Machine v2).
# The machine-readable mirror of .claude/story-templates/README.md; the
# enforcement logic lives in scripts/story-contract-check. Kind precedence is
# first match wins, top to bottom.

kinds:
  - kind: reference
    signal: label reference
    template: .claude/story-templates/reference-artifact.md
    required: [substance]
  - kind: epic
    signal: label epic
    template: .claude/story-templates/epic-roadmap.md
    required: [substance]
  - kind: product-spike
    signal: label product
    template: .claude/story-templates/product-platform-spike.md
    required: [substance]
  - kind: proof
    signal: label benchmark|trial|demo|public-proof
    template: .claude/story-templates/benchmark-trial-demo.md
    required: [substance]
  - kind: platform-story
    signal: label platform|infra (with story)
    template: .claude/story-templates/product-platform-spike.md
    required: [Purpose, Scope/Required design, Acceptance, Hardest obligation, Failure mode]
  - kind: engine-implementation
    signal: label engine, or an Engine milestone
    template: .claude/story-templates/implementation-story.md
    required:
      - Current code evidence
      - Architectural smell
      - Required invariant
      - Acceptance criteria
      - Non-goals
      - Dependencies
      - Benchmarks/proofs
      - Open decisions
      - Hardest obligation
      - Failure mode
  - kind: generic-story
    signal: label story (only)
    template: .claude/story-templates/implementation-story.md
    required: [Acceptance, Non-goals, Hardest obligation]
