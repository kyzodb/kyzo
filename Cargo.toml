[workspace]
resolver = "3"
# xtask (story #81, the resonance gate) is dev tooling only: it is never part
# of the shipped engine tree. scripts/check-pure-rust.sh gates only the
# kyzo/kyzo-bin dependency trees (`cargo tree -p kyzo|kyzo-bin`), so xtask's
# syn/quote/proc-macro2 dependencies never reach the pure-Rust gate.
members = ["kyzo-core", "kyzo-bin", "xtask", "kyzo-crashfs"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "MPL-2.0"
homepage = "https://github.com/kyzodb/kyzo"
repository = "https://github.com/kyzodb/kyzo"

[profile.release]
lto = "thin"
