# KyzoDB CI gates: machine-enforced purity AND security.
#
# This is the guardrail layer that depends on neither agent compliance nor maintainer
# Rust literacy: a red X reads the same to everyone.
#
# Standing rules:
#   - A gate is not "done" until it has a recorded pass-proof AND bite-proof
#     (demonstrated failure on violating input).
#   - No silent skips: the gate-summary job prints every gate outcome; skipped jobs
#     are activation-gated on repo state (Cargo.toml, memcmp.rs, fuzz/) and say so.
#
# Activation: on a codeless repo the cargo-based gates are ARMED BUT IDLE and print so.
# Gates activate on repo state: most arm when the first Cargo.toml lands; coverage/fuzz/tripwire when their inputs exist. Binding
# toolchain jobs (CPython/JVM/Node/Swift/wasm) are added as each binding lands.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    name: Detect activation state
    runs-on: ubuntu-latest
    outputs:
      has_workspace: ${{ steps.check.outputs.has_workspace }}
      has_memcmp: ${{ steps.check.outputs.has_memcmp }}
      has_fuzz: ${{ steps.check.outputs.has_fuzz }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          [ -f Cargo.toml ] && w=true || w=false
          [ -f kyzo-core/src/data/memcmp.rs ] && m=true || m=false
          [ -f fuzz/Cargo.toml ] && f=true || f=false
          echo "has_workspace=$w" >> "$GITHUB_OUTPUT"
          echo "has_memcmp=$m"    >> "$GITHUB_OUTPUT"
          echo "has_fuzz=$f"      >> "$GITHUB_OUTPUT"
          echo "workspace=$w memcmp=$m fuzz=$f (skips below are activation-gated on repo state)"

  # ---------- A. Purity gates ----------

  pure-rust-gate:
    name: Pure-Rust gate (kyzo-core + kyzo-bin)
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        if: needs.detect.outputs.has_workspace == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.detect.outputs.has_workspace == 'true'
      - run: scripts/check-pure-rust.sh

  cargo-deny:
    name: cargo-deny (bans, licenses, advisories)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories

  mpl-headers:
    name: MPL header preservation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: scripts/check-mpl-headers.sh

  lint:
    name: fmt + clippy (whole workspace)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: Build + test (whole workspace, never core-only)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release

  # ---------- B. Security of our own code ----------

  gitleaks:
    name: Secret scan (gitleaks, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run pinned gitleaks
        # Binary is pinned by version + used directly (the gitleaks GitHub Action
        # requires a license key for org repos; the MIT binary does not).
        run: |
          curl -sSfLo gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --no-banner --redact

  unsafe-audit:
    name: Unsafe-code ratchet (engine only)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      # The gate is the grep ratchet + #![forbid(unsafe_code)] (compile-time);
      # a geiger report added minutes of source-compiling for output nothing
      # gated on, so it earns no place here.
      - run: scripts/check-unsafe.sh

  supply-chain:
    name: Supply-chain vetting (cargo vet)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          # Pinned: the trusted-publisher entries in supply-chain/audits.toml need
          # cargo-vet >= 0.10; an unpinned install resolved to an older binary once
          # and failed the TOML parse ("missing field user-id").
          tool: cargo-vet@0.10.2
      - run: scripts/check-supply-chain.sh

  # SAST (CodeQL) runs in .github/workflows/codeql.yml — separate workflow because it
  # needs security-events write permission, which this workflow deliberately lacks.
  # Dependabot config: .github/dependabot.yml (cargo ecosystem activates when Cargo.toml lands).

  # ---------- C. Correctness depth ----------

  coverage:
    name: Coverage ratchet (cargo-llvm-cov)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: scripts/check-coverage.sh

  memcmp-invariant:
    name: memcmp on-disk-format tripwire
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_memcmp == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Runs the on-disk-format law tests (round-trip identity, order
      # embedding, corrupt-input safety). If the filter matches zero tests the
      # job goes RED: a dead tripwire is a failure, fix the filter, never
      # delete the job.
      - run: |
          out=$(cargo test -p kyzo --release storage::tests::law 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q "running 0 tests"; then
            echo "FAIL memcmp tripwire: the law-test filter matched zero tests — fix the filter or the tests, do not delete the job."
            exit 1
          fi

  fuzz-smoke:
    name: Fuzz smoke (every target in fuzz/, 60s each)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_fuzz == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: |
          targets=$(cargo fuzz list)
          if [ -z "$targets" ]; then
            echo "FAIL: fuzz/ exists but lists zero targets — a dead fuzz gate is a failure, not a pass."
            exit 1
          fi
          for t in $targets; do
            echo "=== fuzz target: $t (60s smoke)"
            # Explicit gnu target: cargo-fuzz once auto-selected musl on the runner,
            # and ASAN is incompatible with statically linked libc.
            cargo +nightly fuzz run "$t" --target x86_64-unknown-linux-gnu -- -max_total_time=60
          done

  # ---------- D. Determinism across axes (story #30) ----------
  #
  # The engine's own in-process campaigns (kyzo-core/src/query/trials.rs,
  # time_travel_trials.rs) already prove cross-thread determinism inside one
  # test binary; these two jobs cover what only a second machine can prove:
  # the same seeded workload (kyzo-core/examples/determinism_digest.rs, run
  # via scripts/determinism-campaign.sh) reduces to the SAME digest on a
  # completely different CPU architecture. x86_64 records; aarch64 checks
  # against the recording and fails loudly on any divergence — a real
  # cross-architecture nondeterminism finding, never silenced here.

  determinism-campaign-x86_64:
    name: Determinism campaign (x86_64 digest, story #30)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: scripts/determinism-campaign.sh determinism-digest-x86_64.txt
      - uses: actions/upload-artifact@v7
        with:
          name: determinism-digest-x86_64
          path: determinism-digest-x86_64.txt
          retention-days: 90

  determinism-campaign-aarch64:
    name: Determinism campaign (aarch64 cross-check, story #30)
    # GitHub-hosted arm64 runner: the in-repo leg of the architecture axis.
    # The Raspberry Pi replay (issue #36) is the remaining external leg —
    # real hardware this workflow cannot reach.
    runs-on: ubuntu-24.04-arm
    needs: [detect, determinism-campaign-x86_64]
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The full suite, on aarch64, never core-only — same law as build-test.
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release
      - uses: actions/download-artifact@v8
        with:
          name: determinism-digest-x86_64
      - run: |
          scripts/determinism-campaign.sh determinism-digest-aarch64.txt determinism-digest-x86_64.txt
      - uses: actions/upload-artifact@v7
        with:
          name: determinism-digest-aarch64
          path: determinism-digest-aarch64.txt
          retention-days: 90

  resonance-gate:
    name: Resonance gate (ontology invariants, story #81)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The five deterministic checks over the whole tree (derive-bypass,
      # panic-on-hostile-bytes, copy-detector, dead-concept ratchet,
      # agreement-law registry). Reads resonance-allow.toml and
      # xtask/{decode-surfaces,agreements}.toml at the repo root.
      - run: cargo run -p xtask --release -- resonance
      # Re-proves every check against its historical bug shape, each in its
      # own throwaway rsync copy (never the real tree) — so the gate isn't
      # just green today, it demonstrably still bites.
      - run: scripts/resonance-bite-proof.sh

  # ---------- No silent skips ----------

  gate-summary:
    name: Gate summary (no silent skips)
    runs-on: ubuntu-latest
    needs: [detect, pure-rust-gate, cargo-deny, mpl-headers, lint, build-test, gitleaks, unsafe-audit, supply-chain, coverage, memcmp-invariant, fuzz-smoke, determinism-campaign-x86_64, determinism-campaign-aarch64, resonance-gate]
    if: always()
    steps:
      - name: Print every gate's outcome; fail if any gate failed
        run: |
          summary="detect:${{ needs.detect.result }} pure-rust:${{ needs.pure-rust-gate.result }} cargo-deny:${{ needs.cargo-deny.result }} mpl-headers:${{ needs.mpl-headers.result }} lint:${{ needs.lint.result }} build-test:${{ needs.build-test.result }} gitleaks:${{ needs.gitleaks.result }} unsafe-audit:${{ needs.unsafe-audit.result }} supply-chain:${{ needs.supply-chain.result }} coverage:${{ needs.coverage.result }} memcmp-invariant:${{ needs.memcmp-invariant.result }} fuzz-smoke:${{ needs.fuzz-smoke.result }} determinism-x86_64:${{ needs.determinism-campaign-x86_64.result }} determinism-aarch64:${{ needs.determinism-campaign-aarch64.result }} resonance-gate:${{ needs.resonance-gate.result }}"
          echo "$summary" | tr ' ' '\n'
          echo "'skipped' = activation-gated on repo state, displayed here on purpose. Never hidden."
          case "$summary" in
            *failure*|*cancelled*) echo "FAIL: at least one gate failed."; exit 1 ;;
          esac
          echo "All executed gates passed."
