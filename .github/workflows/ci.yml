# KyzoDB CI purity gates (Slice 0.5).
#
# These gates are the guardrail layer that depends on neither agent compliance nor
# maintainer Rust literacy: a red X reads the same to everyone.
#
# On a repo with no Cargo.toml the cargo-based jobs are ARMED BUT IDLE (they skip or
# pass with an explicit "armed but idle" message). First real bite: Slice 1 (Cargo.toml
# exists for the ban list); full bite: Slice 3 (whole-workspace build + test must be green).
#
# Binding-specific toolchain jobs (CPython, JVM, Node, Swift, wasm) are added as each
# binding slice (4-9) lands and become required checks. They are committed work.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    name: Detect workspace
    runs-on: ubuntu-latest
    outputs:
      has_workspace: ${{ steps.check.outputs.has_workspace }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_workspace=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — cargo gates armed but idle (first bite: Slice 1)."
          fi

  pure-rust-gate:
    name: Pure-Rust gate (kyzo-core + kyzo-bin)
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: needs.detect.outputs.has_workspace == 'true'
      - run: scripts/check-pure-rust.sh

  mpl-headers:
    name: MPL header preservation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check-mpl-headers.sh

  cargo-deny:
    name: cargo-deny (bans, licenses, advisories)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories

  lint:
    name: fmt + clippy (whole workspace)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: Build + test (whole workspace, never core-only)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release
