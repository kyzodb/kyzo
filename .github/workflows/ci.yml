# KyzoDB CI gates: machine-enforced purity AND security.
#
# This is the guardrail layer that depends on neither agent compliance nor maintainer
# Rust literacy: a red X reads the same to everyone.
#
# Standing rules:
#   - A gate is not "done" until it has a recorded pass-proof AND bite-proof
#     (demonstrated failure on violating input).
#   - No silent skips: the gate-summary job prints every gate outcome; skipped jobs
#     are activation-gated on repo state (Cargo.toml, fuzz/) and say so.
#   - An activation probe for a guardian must test for the tests it runs (e.g. a
#     `cargo test --list`-shaped check), never a source filename: a filename probe
#     dies silently the next time that file moves or is renamed. The memcmp
#     on-disk-format tripwire below is the exemplar — it has no `detect`-level
#     gate at all; running the law tests and failing loud on a zero-match filter
#     IS its own activation proof.
#
# Activation: on a codeless repo the cargo-based gates are ARMED BUT IDLE and print so.
# Gates activate on repo state: most arm when the first Cargo.toml lands; fuzz when its inputs exist. Binding
# toolchain jobs (CPython/JVM/Node/Swift/wasm) are added as each binding lands.

name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    name: Detect activation state
    runs-on: ubuntu-latest
    outputs:
      has_workspace: ${{ steps.check.outputs.has_workspace }}
      has_fuzz: ${{ steps.check.outputs.has_fuzz }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          [ -f Cargo.toml ] && w=true || w=false
          [ -f fuzz/Cargo.toml ] && f=true || f=false
          echo "has_workspace=$w" >> "$GITHUB_OUTPUT"
          echo "has_fuzz=$f"      >> "$GITHUB_OUTPUT"
          echo "workspace=$w fuzz=$f (skips below are activation-gated on repo state)"

  # ---------- A. Purity gates ----------

  pure-rust-gate:
    name: Pure-Rust gate (kyzo-core + kyzo-bin)
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        if: needs.detect.outputs.has_workspace == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.detect.outputs.has_workspace == 'true'
      - run: cargo run -p xtask --release -- pure-rust

  cargo-deny:
    name: cargo-deny (bans, licenses, advisories)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories

  mpl-headers:
    name: MPL header preservation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: scripts/check-mpl-headers.sh

  lint:
    name: fmt + clippy (first-party crates)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # Scoped to first-party crates exactly as the local seal (the xtask
      # `clippy` verb, crates/xtask/src/verbs.rs): `--workspace` catches vendor/fjall and
      # vendor/lsm-tree's `unsafe` blocks, which first-party
      # `#![forbid(unsafe_code)]` already rules out at compile time and
      # which are #118's story, not this gate's. `--no-deps` keeps the
      # vendored dependency trees themselves out of scope too.
      - run: cargo clippy -p kyzo --release --all-targets --no-deps -- -D warnings
      - run: cargo clippy -p kyzo-bin -p kyzo-crashfs -p kyzo-lsp -p kyzo-arrow-interop --release --all-targets --no-deps -- -D warnings

  build-test:
    name: Build + test (whole workspace, never core-only)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release

  # ---------- B. Security of our own code ----------

  gitleaks:
    name: Secret scan (gitleaks, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run pinned gitleaks
        # Binary is pinned by version + used directly (the gitleaks GitHub Action
        # requires a license key for org repos; the MIT binary does not).
        run: |
          curl -sSfLo gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --no-banner --redact

  unsafe-audit:
    name: Unsafe-code ratchet (engine only)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The gate is the grep ratchet + #![forbid(unsafe_code)] (compile-time);
      # a geiger report added minutes of source-compiling for output nothing
      # gated on, so it earns no place here.
      - run: cargo run -p xtask --release -- unsafe

  supply-chain:
    name: Supply-chain vetting (cargo vet)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          # Pinned: the trusted-publisher entries in supply-chain/audits.toml need
          # cargo-vet >= 0.10; an unpinned install resolved to an older binary once
          # and failed the TOML parse ("missing field user-id").
          tool: cargo-vet@0.10.2
      - run: scripts/check-supply-chain.sh

  # SAST (CodeQL) runs in .github/workflows/codeql.yml — separate workflow because it
  # needs security-events write permission, which this workflow deliberately lacks.
  # Dependabot config: .github/dependabot.yml (cargo ecosystem activates when Cargo.toml lands).

  # ---------- C. Correctness depth ----------
  #
  # No coverage job here by design (story #321, pre-commitment c): a
  # percentage floor measures execution, not assertion — a line can run
  # under a test that asserts nothing about it and still count as
  # "covered." The mutation standard (epic #192, story #310) owns
  # correctness-depth measurement instead; it proves a test actually
  # fails when the code it covers is wrong. No successor coverage job
  # exists, and none should be added without a new ruling.

  memcmp-invariant:
    name: memcmp on-disk-format tripwire
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Activation IS running the tests: no separate `detect`-level filename
      # probe exists for this job (a probe like "does data/memcmp.rs exist"
      # would go silently, permanently dark the moment that file is renamed
      # or split — exactly what happened when the codec moved to
      # data/value/canonical.rs, and again when storage::tests::law moved to
      # kyzo-model format::tests::law*). Runs the on-disk-format law tests
      # (round-trip identity, order embedding, corrupt-input safety).
      # `--lib` scopes the run to the one binary the filter can match
      # (crates/kyzo-model's own unit tests): every OTHER binary in the
      # workspace also reports "running 0 tests" for a filter it can never
      # match, which would make the zero-tests check below fire
      # unconditionally over the unscoped combined output — a false RED
      # that is exactly as useless as the false GREEN this job used to
      # give. If the filter matches zero tests the job goes RED: a dead
      # tripwire is a failure, fix the filter, never delete the job.
      - run: |
          out=$(cargo test -p kyzo-model --release --lib format::tests::law 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q "running 0 tests"; then
            echo "FAIL memcmp tripwire: the law-test filter matched zero tests — fix the filter or the tests, do not delete the job."
            exit 1
          fi

  fuzz-smoke:
    name: Fuzz smoke (every target in fuzz/, 60s each)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_fuzz == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # taiki-e/install-action does not carry cargo-fuzz in its tool
      # manifest (verified against TOOLS.md) — the action step failed
      # outright, before any target ever ran, which is why this job never
      # got as far as fuzzing anything. `cargo install` is the universal
      # fallback every tool supports.
      - run: cargo install cargo-fuzz --locked
      - run: |
          targets=$(cargo fuzz list)
          if [ -z "$targets" ]; then
            echo "FAIL: fuzz/ exists but lists zero targets — a dead fuzz gate is a failure, not a pass."
            exit 1
          fi
          for t in $targets; do
            echo "=== fuzz target: $t (60s smoke)"
            # Explicit gnu target: cargo-fuzz once auto-selected musl on the runner,
            # and ASAN is incompatible with statically linked libc.
            cargo +nightly fuzz run "$t" --target x86_64-unknown-linux-gnu -- -max_total_time=60
          done

  # ---------- D. Determinism across axes (story #30) ----------
  #
  # The engine's own in-process campaigns (crates/kyzo-core/src/query/trials.rs,
  # time_travel_trials.rs) already prove cross-thread determinism inside one
  # test binary; these two jobs cover what only a second machine can prove:
  # the same seeded workload (crates/kyzo-core/examples/determinism_digest.rs, run
  # via scripts/determinism-campaign.sh) reduces to the SAME digest on a
  # completely different CPU architecture. x86_64 records; aarch64 checks
  # against the recording and fails loudly on any divergence — a real
  # cross-architecture nondeterminism finding, never silenced here.

  determinism-campaign-x86_64:
    name: Determinism campaign (x86_64 digest, story #30)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: scripts/determinism-campaign.sh determinism-digest-x86_64.txt
      - uses: actions/upload-artifact@v7
        with:
          name: determinism-digest-x86_64
          path: determinism-digest-x86_64.txt
          retention-days: 90

  determinism-campaign-aarch64:
    name: Determinism campaign (aarch64 cross-check, story #30)
    # GitHub-hosted arm64 runner: the in-repo leg of the architecture axis.
    # The Raspberry Pi replay (issue #36) is the remaining external leg —
    # real hardware this workflow cannot reach.
    runs-on: ubuntu-24.04-arm
    needs: [detect, determinism-campaign-x86_64]
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The full suite, on aarch64, never core-only — same law as build-test.
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release
      - uses: actions/download-artifact@v8
        with:
          name: determinism-digest-x86_64
      - run: |
          scripts/determinism-campaign.sh determinism-digest-aarch64.txt determinism-digest-x86_64.txt
      - uses: actions/upload-artifact@v7
        with:
          name: determinism-digest-aarch64
          path: determinism-digest-aarch64.txt
          retention-days: 90

  resonance-gate:
    name: Resonance gate (bs-detector conduct checks)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Every check registered in crates/bs-detector/checks.toml over ALL of
      # crates/, waivers from crates/bs-detector/waivers.toml, zero baseline.
      # A red exit is the verdict.
      - run: cargo run -p bs-detector --release -- --root . --dry-run
      # The bite proofs: every registered check must detonate on its
      # historical bug shape (the registry refuses a check whose proof fn
      # does not exist — this run proves the proofs themselves pass).
      - run: cargo test -p bs-detector

  release-checked-test:
    name: Release-checked test (overflow-checks + debug-assertions live, story #300 T3)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The whole first-party test suite run again under the `release-checked`
      # profile: release-speed optimization, overflow-checks and
      # debug-assertions live. This is the mechanical proof that no raw
      # stored-byte arithmetic slipped past the T2 quantity types. The blanket
      # `overflow-checks` toggle in `[profile.release]` is the fuzzing safety
      # net only; this step is the correctness mechanism.
      - run: cargo test --workspace --exclude fjall --exclude lsm-tree --exclude xtask --profile release-checked

  # ---------- No silent skips ----------

  fast-tests:
    name: Fast tests (lib, every push)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_workspace == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The fast correctness tier: EVERY crate's library unit tests in the
      # debug profile, on EVERY push (not just main/PR) — widened from the
      # original two-crate list (kyzo-model, kyzo) after an audit found every
      # other first-party crate's lib tests uncovered by this tier. This is
      # the light-tier counterpart to build-test's whole-workspace release
      # run — it catches a broken unit test per-commit instead of only at PR.
      # The genuinely-slow campaign tiers stay out of THIS job by construction
      # (`--ignored` is never passed): kyzo-trials' own DST/crash/fuzz/gauntlet
      # campaigns are `#[ignore]`-marked and auto-skip under plain `cargo
      # test`, same as before the widen.
      - run: cargo test --workspace --lib

  actionlint:
    name: actionlint (workflow static lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Static-checks every .github/workflows/*.yml: invalid runner labels,
      # broken needs:/matrix refs, shell quoting, expression typos — the
      # class of release.yml bug a hand review and `yaml.safe_load` cannot
      # catch. Tag-pinned image (digest-pin is the hardening follow-up).
      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.7 -color

  gate-summary:
    name: Gate summary (no silent skips)
    runs-on: ubuntu-latest
    needs: [detect, pure-rust-gate, cargo-deny, mpl-headers, lint, build-test, gitleaks, unsafe-audit, supply-chain, memcmp-invariant, fuzz-smoke, determinism-campaign-x86_64, determinism-campaign-aarch64, resonance-gate, release-checked-test, actionlint, fast-tests]
    if: always()
    steps:
      - name: Print every gate's outcome; fail if any gate failed
        run: |
          summary="detect:${{ needs.detect.result }} pure-rust:${{ needs.pure-rust-gate.result }} cargo-deny:${{ needs.cargo-deny.result }} mpl-headers:${{ needs.mpl-headers.result }} lint:${{ needs.lint.result }} build-test:${{ needs.build-test.result }} gitleaks:${{ needs.gitleaks.result }} unsafe-audit:${{ needs.unsafe-audit.result }} supply-chain:${{ needs.supply-chain.result }} memcmp-invariant:${{ needs.memcmp-invariant.result }} fuzz-smoke:${{ needs.fuzz-smoke.result }} determinism-x86_64:${{ needs.determinism-campaign-x86_64.result }} determinism-aarch64:${{ needs.determinism-campaign-aarch64.result }} resonance-gate:${{ needs.resonance-gate.result }} release-checked-test:${{ needs.release-checked-test.result }} actionlint:${{ needs.actionlint.result }} fast-tests:${{ needs.fast-tests.result }}"
          echo "$summary" | tr ' ' '\n'
          echo "'skipped' = activation-gated on repo state, displayed here on purpose. Never hidden."
          case "$summary" in
            *failure*|*cancelled*) echo "FAIL: at least one gate failed."; exit 1 ;;
          esac
          echo "All executed gates passed."
