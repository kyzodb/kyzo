# Release pipeline: on a `v0.Y.Z` tag push, this is the ONLY way a KyzoDB release comes to exist.
#
# See VERSIONING.md for the ruling and RELEASING.md for the operator runbook this workflow
# implements mechanically. The standing rule: a release built on anything but a green,
# main-ancestor commit is worse than no release — it spends the trust the whole gate apparatus in
# ci.yml exists to earn. So this workflow either produces a complete, correct release, or it
# refuses loudly and produces nothing.
#
# Jobs, in dependency order:
#   verify-provenance  -> the tag commit must be an ancestor of main AND CI must have reported
#                         green on that exact commit SHA (checked live via the API, never assumed).
#   pure-rust-gate,
#   unsafe-audit,
#   lint, build-test    -> a hermetic re-run of ci.yml's core gates on a FRESH checkout of the
#                         tagged commit. This never reuses ci.yml's earlier run or its artifacts —
#                         the whole point is that the release pipeline trusts nothing it didn't
#                         just verify itself. (cargo-deny/mpl-headers/gitleaks/fuzz stay in
#                         ci.yml; they gate every push and pull request already. What's re-run here
#                         is the subset a stale-artifact or wrong-commit release would most
#                         visibly falsify: does it build, does it pass, is it clean, is it pure,
#                         is it unsafe-free.)
#   build-artifacts     -> kyzo-bin release binaries (linux x86_64, macOS arm64/x86_64, windows
#                         x86_64) + per-target SHA256SUMS, built as a matrix across native runners.
#   publish-release     -> drafts and publishes the GitHub Release: changelog since the previous
#                         tag, the gate summary, FormatVersion, a benchmark-status placeholder for
#                         a human to fill in (see RELEASING.md), and the attribution note.
#   publish-crates      -> `cargo publish -p kyzo`, gated on the `crates-io` GitHub Environment
#                         (manual approval). No-ops loudly if CARGO_REGISTRY_TOKEN isn't configured
#                         — a missing credential is never a red build.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-provenance:
    name: Verify tag is ancestor of main + CI green on this exact SHA
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Refuse anything but a green, main-ancestor commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"

          echo "== Checking $sha is an ancestor of main =="
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::REFUSED — tag commit $sha is not reachable from main. Releases are cut only from commits that are ancestors of main (see VERSIONING.md)."
            exit 1
          fi
          echo "OK: $sha is an ancestor of main."

          echo "== Checking CI reported success on $sha =="
          runs=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=10" --jq '.workflow_runs')
          count=$(echo "$runs" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "::error::REFUSED — no CI workflow run exists for commit $sha. A release requires a recorded green CI run on the exact tagged commit, not an assumption that it would have passed."
            exit 1
          fi
          status=$(echo "$runs" | jq -r '.[0].status')
          conclusion=$(echo "$runs" | jq -r '.[0].conclusion')
          echo "Most recent CI run for $sha: status=$status conclusion=$conclusion"
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::REFUSED — CI on commit $sha is status=$status conclusion=$conclusion, not a completed success. Releases come only from green main."
            exit 1
          fi
          echo "OK: CI succeeded on $sha. Provenance verified."
      - name: Version agreement (tag / Cargo.toml / CHANGELOG)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          changelog=$(grep -m1 -oP '^## \[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "tag=$tag manifest=$manifest changelog=$changelog"
          if [ "$tag" != "$manifest" ] || [ "$tag" != "$changelog" ]; then
            echo "::error::REFUSED — version drift: tag=$tag Cargo.toml=$manifest CHANGELOG=$changelog must all agree (see VERSIONING.md)."
            exit 1
          fi

  # ---------- Hermetic gate re-run (fresh checkout, mirrors ci.yml's core gates) ----------

  pure-rust-gate:
    name: Pure-Rust gate (kyzo-core + kyzo-bin)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.verify-provenance.result == 'success') }}
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    needs: verify-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask --release -- pure-rust

  unsafe-audit:
    name: Unsafe-code ratchet (engine only)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.verify-provenance.result == 'success') }}
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    needs: verify-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask --release -- unsafe

  lint:
    name: fmt + clippy (whole workspace)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.verify-provenance.result == 'success') }}
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    needs: verify-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: Build + test (whole workspace)
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.verify-provenance.result == 'success') }}
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    needs: verify-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release

  # ---------- Reproducibility ----------

  double-build-diff:
    name: Double-build diff (byte-identical release binary)
    runs-on: ubuntu-latest
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - name: Build A (independent CARGO_TARGET_DIR)
        env:
          CARGO_TARGET_DIR: /tmp/double-a
        run: cargo build -p kyzo-bin --release --target x86_64-unknown-linux-gnu
      - name: Build B (independent CARGO_TARGET_DIR)
        env:
          CARGO_TARGET_DIR: /tmp/double-b
        run: cargo build -p kyzo-bin --release --target x86_64-unknown-linux-gnu
      - name: Compare the two builds byte-for-byte
        run: |
          set -euo pipefail
          a=/tmp/double-a/x86_64-unknown-linux-gnu/release/kyzo
          b=/tmp/double-b/x86_64-unknown-linux-gnu/release/kyzo
          sha256sum "$a" "$b"
          if ! cmp "$a" "$b"; then
            echo "::error::REFUSED — double-build diff: the two builds of ${{ github.sha }} are not byte-identical"
            exit 1
          fi
          echo "OK: both builds of ${{ github.sha }} are byte-identical ($(sha256sum "$a" | awk '{print $1}'))."

  # ---------- Artifacts ----------

  build-artifacts:
    name: Build kyzo-bin release artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [pure-rust-gate, unsafe-audit, lint, build-test, double-build-diff]
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: kyzo
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: kyzo
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: kyzo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: kyzo.exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - uses: Swatinem/rust-cache@v2
      - name: Install target toolchain (pinned via rust-toolchain.toml)
        run: rustup target add ${{ matrix.target }}
      - name: Build kyzo-bin (release, ${{ matrix.target }})
        run: cargo build -p kyzo-bin --release --target ${{ matrix.target }}
      - name: Version agreement (built binary vs tag)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          got=$(./target/${{ matrix.target }}/release/${{ matrix.bin }} --version | awk '{print $NF}')
          if [ "$got" != "$tag" ]; then
            echo "::error::REFUSED — built binary reports version $got, tag is $tag."
            exit 1
          fi
          echo "OK: binary reports $got, matching tag."
      - name: Generate SBOM (CycloneDX)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="dryrun-${GITHUB_SHA::12}"
          fi
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path crates/kyzo-bin/Cargo.toml --format json
          mkdir -p dist
          mv crates/kyzo-bin/kyzo-bin.cdx.json "dist/kyzo-${tag}-${{ matrix.target }}.cdx.json"
          find . -name '*.cdx.json' -not -path './dist/*' -delete
      - name: Package + checksum
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="dryrun-${GITHUB_SHA::12}"
          fi
          dir="kyzo-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$dir"
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} "dist/$dir/"
          cp README.md LICENSE-MPL FORK.md "dist/$dir/"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            (cd dist && tar czf "$dir.tar.gz" "$dir")
            (cd dist && sha256sum "$dir.tar.gz" "kyzo-${tag}-${{ matrix.target }}.cdx.json" > "SHA256SUMS-${{ matrix.target }}")
          else
            (cd dist && tar -a -cf "$dir.zip" "$dir")
            (cd dist && sha256sum "$dir.zip" "kyzo-${tag}-${{ matrix.target }}.cdx.json" > "SHA256SUMS-${{ matrix.target }}")
          fi
          ls -la dist/
          cat "dist/SHA256SUMS-${{ matrix.target }}"
      - name: Provenance manifest (commit + environment + command)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="dryrun-${GITHUB_SHA::12}"
          fi
          toolchain="$(grep -m1 '^channel' rust-toolchain.toml | sed 's/.*"\(.*\)"/\1/')"
          artifacts=""
          while read -r hash name; do
            artifacts="${artifacts}{\"name\":\"${name}\",\"sha256\":\"${hash}\"},"
          done < "dist/SHA256SUMS-${{ matrix.target }}"
          artifacts="[${artifacts%,}]"
          cat > "dist/kyzo-${tag}-${{ matrix.target }}.provenance.json" <<EOF
          {
            "tag": "${tag}",
            "commit": "${GITHUB_SHA}",
            "build_environment": {
              "runner_os": "${{ matrix.os }}",
              "target": "${{ matrix.target }}",
              "toolchain": "${toolchain}"
            },
            "build_command": "cargo build -p kyzo-bin --release --target ${{ matrix.target }}",
            "artifacts": ${artifacts}
          }
          EOF
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign artifacts (keyless, Rekor-logged)
        run: |
          set -euo pipefail
          cd dist
          for f in *.tar.gz *.zip *.cdx.json *.provenance.json SHA256SUMS-*; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -la *.sig *.pem
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS-*
            dist/*.cdx.json
            dist/*.provenance.json
            dist/*.sig
            dist/*.pem
          retention-days: 90

  # ---------- Release ----------

  publish-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-artifacts
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: dist
      - name: Draft release notes (RELEASING.md's mandatory sections)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prev_tag=$(git tag --sort=-creatordate --merged "$tag" | grep -v "^${tag}$" | head -1 || true)

          {
            echo "## Changelog"
            echo
            if [ -n "$prev_tag" ]; then
              echo "Commits since ${prev_tag}:"
              echo
              git log "${prev_tag}..${tag}" --pretty=format:'- %s (%h)'
            else
              echo "Initial release — no previous tag to diff against. See CHANGELOG.md's [${tag#v}] entry for the full shipped scope."
            fi
            echo
            echo
            echo "## Gate summary"
            echo
            echo "Hermetic re-run on commit \`${{ github.sha }}\`, fresh checkout (not reused from the original CI run):"
            echo
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| Pure-Rust gate | success |"
            echo "| Unsafe-code ratchet | success |"
            echo "| fmt + clippy -D warnings | success |"
            echo "| build --workspace --release | success |"
            echo "| test --workspace --release | success |"
            echo
            echo "(This job only runs if every gate above passed — a failing gate blocks \`build-artifacts\` and this job never starts. See ci.yml for the full gate set — cargo-deny, MPL headers, secret scan, supply-chain, memcmp tripwire, fuzz smoke — enforced on every push and pull request already.)"
            echo
            echo "## FormatVersion"
            echo
            fv=$(grep -oP 'pub const CURRENT: FormatVersion = FormatVersion\(\K[0-9]+' crates/kyzo-core/src/store/contract.rs || echo "unknown")
            echo "FormatVersion: ${fv} — see VERSIONING.md for the migration stance."
            echo
            echo "## Benchmark status"
            echo
            echo "_Fill in before publishing: criterion numbers for this wave, including any regressions or losing runs against the prior release (CLAUDE.md: benchmarks are instruments, never gates — a known regression still ships, named plainly)._"
            echo
            echo "## Attribution"
            echo
            echo "KyzoDB is a fork of [CozoDB](https://github.com/cozodb/cozo) (Ziyang Hu and the Cozo Project Authors), MPL-2.0. See [FORK.md](FORK.md) for the full lineage. This release changes nothing about that attribution."
          } > notes.md
          cat notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file notes.md \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS-* dist/*.cdx.json dist/*.provenance.json dist/*.sig dist/*.pem

  # ---------- crates.io ----------

  publish-crates:
    name: Publish to crates.io (manual approval)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    container:
      image: rust:1.96.1-bookworm@sha256:a339861ae23e9abb272cea45dfafde21760d2ce6577a70f8a926153677902663
    needs: publish-release
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - name: cargo publish -p kyzo (no-op loudly if no token)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "No CARGO_REGISTRY_TOKEN secret configured in the crates-io environment."
            echo "Skipping crates.io publication. This is NOT a failure: the GitHub Release above"
            echo "already exists and is the release of record. Configure the secret and re-run this"
            echo "job (Actions -> this run -> Re-run jobs) to publish to crates.io."
            exit 0
          fi
          cargo publish -p kyzo --locked
