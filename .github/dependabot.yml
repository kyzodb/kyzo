# Dependabot: continuous dependency updates, so advisory coverage
# is not point-in-time.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]

  # Note: cargo bumps desync the version-pinned cargo-vet exemptions and turn
  # the supply-chain gate red until re-vetted. Loud on purpose.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
