# Story #81 check 2: the panic-on-hostile-bytes lint's decode-surface
# declaration. Each `[[surface]]` names a file that decodes untrusted bytes
# (on disk or on the wire) and the entrypoint function(s)/method(s) where
# hostile input first enters that file's decode path — the declared roots
# the check closes over via same-file callee reachability. Declared, not
# inferred: adding a new decode path means adding its entrypoint here.

# Value-plane seat: codec lives in `kyzo-model` (not `kyzo-core/data/value/*`).
# Bitemporal read paths live in `store/time.rs` (not `data/bitemporal.rs`).

[[surface]]
file = "crates/kyzo-model/src/value/canonical.rs"
# The tag-driven byte walk itself: `decode`/`decode_one` dispatch on the
# leading tag byte and recurse through `decode_at`, `decode_terminated`
# (String/Bytes byte-groups), and `decode_sequence` (List/Set), all in this
# file, all reachable from these two entrypoints.
entrypoints = ["decode", "decode_one"]

[[surface]]
file = "crates/kyzo-model/src/value/number.rs"
# `Num::decode_key` is called from `canonical.rs::decode_at`'s `Tag::Num`
# arm, but same-file reachability can't see across that call — it needs
# its own entrypoint here or its panic-shaped constructs go uninspected.
entrypoints = ["Num::decode_key"]

[[surface]]
file = "crates/kyzo-model/src/value/mod.rs"
# Public tuple/key decode entrypoints: each is a thin wrapper over
# `canonical::decode_one`, so they contribute nothing to the closure beyond
# their own bodies, but they are still the first door hostile bytes cross.
entrypoints = [
  "DataValue::decode_from_key",
  "decode_values_all",
  "decode_tuple_from_key",
  "extend_tuple_from_v",
  "decode_key_into",
  "decode_tuple_from_kv",
]

[[surface]]
file = "crates/kyzo-model/src/value/row.rs"
# `RelationId::raw_decode` — the exact seam the historical bug (assert!-
# bounded, fed corrupt catalog bytes) lived on.
entrypoints = ["RelationId::raw_decode"]

[[surface]]
file = "crates/kyzo-core/src/store/time.rs"
# Bitemporal read paths: claim-polarity byte decode, the skip-scan's
# key-side bitemporal resolution, the system-stamp read, and the
# value-side extension read.
entrypoints = [
  "claim_polarity_of_value",
  "check_key_for_bitemporal",
  "system_stamp_of_key",
  "extend_tuple_from_bitemporal_v",
]
