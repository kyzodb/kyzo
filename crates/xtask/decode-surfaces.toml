# Story #81 check 2: the panic-on-hostile-bytes lint's decode-surface
# declaration. Each `[[surface]]` names a file that decodes untrusted bytes
# (on disk or on the wire) and the entrypoint function(s)/method(s) where
# hostile input first enters that file's decode path — the declared roots
# the check closes over via same-file callee reachability. Declared, not
# inferred: adding a new decode path means adding its entrypoint here.

# Story #321: memcmp.rs/fact_payload.rs/tuple.rs no longer exist — the
# codec split into crates/kyzo-core/src/data/value/{canonical,number,mod,row}.rs
# during the value-plane migration (see .claude/rules/deprecated-migrated.md's
# "data/value/ core" entry) and the surfaces below were never repointed, so
# this check silently stopped covering any real code the moment the split
# landed. Repointed to the current file layout; the CLOSURE, not just the
# file paths, was re-derived: same-file reachability means a thin wrapper
# that forwards into another file (e.g. `data/value/mod.rs`'s decode
# functions, which all bottom out in `canonical::decode_one`) closes over
# NOTHING by itself — the file that actually walks tagged bytes needs its
# own declared entrypoint, or the guardian goes dark again in a new shape.

[[surface]]
file = "crates/kyzo-core/src/data/value/canonical.rs"
# The tag-driven byte walk itself: `decode`/`decode_one` dispatch on the
# leading tag byte and recurse through `decode_at`, `decode_terminated`
# (String/Bytes byte-groups — memcmp.rs's `decode_bytes` folded in here),
# and `decode_sequence` (List/Set), all in this file, all reachable from
# these two entrypoints. This is where the on-disk format's whole module
# doc protection actually lives now (see .claude/rules/memcmp.md).
entrypoints = ["decode", "decode_one"]

[[surface]]
file = "crates/kyzo-core/src/data/value/number.rs"
# `Num::decode_key` is called from `canonical.rs::decode_at`'s `Tag::Num`
# arm, but same-file reachability can't see across that call — it needs
# its own entrypoint here or its panic-shaped constructs go uninspected.
entrypoints = ["Num::decode_key"]

[[surface]]
file = "crates/kyzo-core/src/data/value/mod.rs"
# The public tuple/key decode entrypoints (memcmp.rs's `Num::decode_from_key`/
# `DataValue::decode_from_key` and tuple.rs's whole surface both live here
# now): each is a thin wrapper over `canonical::decode_one`, so they
# contribute nothing to the closure beyond their own bodies, but they are
# still the first door hostile bytes cross and stay declared for that
# reason (and so a future wrapper added here that stops being thin is
# caught).
entrypoints = [
  "DataValue::decode_from_key",
  "decode_values_all",
  "decode_tuple_from_key",
  "extend_tuple_from_v",
  "decode_key_into",
  "decode_tuple_from_kv",
]

[[surface]]
file = "crates/kyzo-core/src/data/value/row.rs"
# `RelationId::raw_decode` — the exact seam the historical bug (assert!-
# bounded, fed corrupt catalog bytes) lived on, now in the value plane's
# row/key module instead of tuple.rs.
entrypoints = ["RelationId::raw_decode"]

[[surface]]
file = "crates/kyzo-core/src/data/bitemporal.rs"
# Unmoved by the split. The bitemporal read paths: claim-polarity byte
# decode, the skip-scan's key-side bitemporal resolution, the
# system-stamp read, and the value-side extension read.
entrypoints = [
  "claim_polarity_of_value",
  "check_key_for_bitemporal",
  "system_stamp_of_key",
  "extend_tuple_from_bitemporal_v",
]
