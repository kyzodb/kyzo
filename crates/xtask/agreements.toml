# Story #81 check 5: the world-model agreement-law registry. Every entry
# names one test that proves two independently-maintained pieces of the
# engine agree — a memcmp encoding's byte order against `DataValue`'s own
# `Ord`, the naive Datalog oracle against the real semi-naive engine, the
# stratifier's refusal boundary against the oracle's, the bitemporal
# resolution kernel against its own naive mirror, a temporal index built by
# backfill against the same index built incrementally. Absence is the
# signal this check watches for: if a listed test's function is no longer
# in its file (renamed, deleted, or moved without updating this registry),
# the gate goes red — the law stopped being checked and nobody would
# otherwise notice.
#
# Paths repointed to current seats after the storage→store / query→exec /
# data/value→kyzo-model / runtime→session / engines→project migration.
# Where a law was renamed at its new seat, `test_fn` follows the successor
# that still proves the same agreement (never deleted to green).

[[law]]
name = "memcmp byte order embeds DataValue::Ord (corpus)"
file = "crates/kyzo-model/src/format/tests.rs"
test_fn = "law2_order_embedding_corpus_pairwise"

[[law]]
name = "memcmp byte order embeds DataValue::Ord (generative)"
file = "crates/kyzo-model/src/value/canonical.rs"
test_fn = "law_order_embedding_randomized"

[[law]]
name = "memcmp round-trip identity (corpus)"
file = "crates/kyzo-model/src/format/tests.rs"
test_fn = "law1_round_trip_corpus"

[[law]]
