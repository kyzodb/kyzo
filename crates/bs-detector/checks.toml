# --- meta: the detector policing itself ----------------------------------------

[[check]]
name = "coverage"
engine = "meta"
policy = "hard-ban"
law = "a file that exists in the boundary but was never delivered to the engines"
bite_proof = "bite_coverage"

[[check]]
name = "unparsed"
engine = "meta"
policy = "hard-ban"
law = "a file syn cannot read is invisible to every syn check — reported, never skipped"
bite_proof = "bite_unparsed"

[[check]]
name = "forbid_roots"
engine = "meta"
policy = "sworn-waiver"
law = "a crate root without #![forbid(unsafe_code)] leaves the whole crate's proof open"
bite_proof = "bite_forbid_roots"
