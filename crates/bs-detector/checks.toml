# The Bullshit Detector check registry. Every entry is one law: a named
# lie-shape, the engine that detects it, the policy that governs survival
# (hard-ban = no testimony can exist; sworn-waiver = site-bound sworn
# testimony in waivers.toml only), and the bite-proof test that must exist
# and detonate before the check may register. Scope is NOT a field here:
# every check sees all of crates/; the only lawful narrowing is a
# [[scope_waiver]] in waivers.toml, printed on every run.

# --- shape: panics where typed refusal is owed -----------------------------

[[check]]
name = "unwrap"
engine = "shape"
matcher = "unwrap"
policy = "sworn-waiver"
law = "a panic on a path reachable from a caller where a typed refusal is owed"
bite_proof = "bite_unwrap"

[[check]]
name = "expect"
engine = "shape"
matcher = "expect"
policy = "sworn-waiver"
law = "a panic with a message is still a panic where a typed refusal is owed"
bite_proof = "bite_expect"

[[check]]
name = "unwrap_or"
engine = "shape"
matcher = "unwrap_or"
policy = "sworn-waiver"
law = "an error silently replaced by a fabricated value the caller never sees refused"
bite_proof = "bite_unwrap_or"

[[check]]
name = "unwrap_or_else"
engine = "shape"
matcher = "unwrap_or_else"
policy = "sworn-waiver"
law = "an error silently replaced by a computed fallback instead of a refusal"
bite_proof = "bite_unwrap_or_else"

[[check]]
name = "unwrap_or_default"
engine = "shape"
matcher = "unwrap_or_default"
policy = "sworn-waiver"
law = "an error silently replaced by a type's default — the quietest possible lie"
bite_proof = "bite_unwrap_or_default"

[[check]]
name = "unwrap_unchecked"
engine = "shape"
matcher = "unwrap_unchecked"
policy = "hard-ban"
law = "undefined behavior the moment the assumption is wrong; no testimony makes UB lawful"
bite_proof = "bite_unchecked_unwrap"

[[check]]
name = "panic_bang"
engine = "shape"
matcher = "panic_bang"
policy = "sworn-waiver"
law = "an explicit crash on a caller-reachable path where a typed refusal is owed"
bite_proof = "bite_panic_bang"

[[check]]
name = "unreachable_bang"
engine = "shape"
matcher = "unreachable_bang"
policy = "sworn-waiver"
law = "a claim of impossibility that crashes instead of refusing when it is wrong"
bite_proof = "bite_unreachable_bang"

[[check]]
name = "todo_bang"
engine = "shape"
matcher = "todo_bang"
policy = "hard-ban"
law = "an unfinished hole committed as if it were an implementation"
bite_proof = "bite_todo_bang"

[[check]]
name = "debug_assert"
engine = "shape"
matcher = "debug_assert"
policy = "sworn-waiver"
law = "an invariant enforced only in debug builds — release ships with the law compiled out"
bite_proof = "bite_debug_assert"

