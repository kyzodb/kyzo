<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" role="img" aria-label="Every generated program is answered by both the optimized engine and the naive oracle; the answers must be byte-identical or the defect is pinned as a regression forever.">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5d6f64"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F7E52"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9c5342"/></marker>
  </defs>

  <rect x="1" y="1" width="758" height="278" rx="3" fill="#0c1310" stroke="#263229"/>

  <!-- generated programs -->
  <rect x="24" y="104" width="150" height="72" rx="3" fill="#18221c" stroke="#2F7E52"/>
  <text x="99" y="134" font-size="12.5" font-weight="600" fill="#eef3ef" text-anchor="middle">generated</text>
  <text x="99" y="152" font-size="12.5" font-weight="600" fill="#eef3ef" text-anchor="middle">programs</text>

  <path d="M174,128 C200,128 202,66 226,66" fill="none" stroke="#35443b" stroke-width="1.6" marker-end="url(#a)"/>
  <path d="M174,152 C200,152 202,214 226,214" fill="none" stroke="#35443b" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- optimized engine -->
  <rect x="230" y="38" width="196" height="58" rx="3" fill="#18221c" stroke="#35443b"/>
  <text x="328" y="62" font-size="12.5" font-weight="600" fill="#a9baaf" text-anchor="middle">optimized engine</text>
  <text x="328" y="80" font-size="10.5" fill="#7c8f83" text-anchor="middle">semi-naive · magic sets</text>

  <!-- reference oracle -->
  <rect x="230" y="186" width="196" height="58" rx="3" fill="#18221c" stroke="#35443b"/>
  <text x="328" y="208" font-size="12.5" font-weight="600" fill="#a9baaf" text-anchor="middle">reference oracle</text>
  <text x="328" y="226" font-size="10.5" fill="#7c8f83" text-anchor="middle">naive · obviously correct</text>

  <path d="M426,67 C470,67 486,120 505,132" fill="none" stroke="#35443b" stroke-width="1.6" marker-end="url(#a)"/>
  <path d="M426,215 C470,215 486,160 505,148" fill="none" stroke="#35443b" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- gate -->
  <polygon points="565,90 630,140 565,190 500,140" fill="#18221c" stroke="#35443b" stroke-width="1.5"/>
  <text x="565" y="136" font-size="11" font-weight="600" fill="#a9baaf" text-anchor="middle">byte-identical</text>
  <text x="565" y="152" font-size="11" font-weight="600" fill="#a9baaf" text-anchor="middle">answers?</text>

  <!-- yes -->
  <path d="M600,116 C650,90 660,78 690,78" fill="none" stroke="#2F7E52" stroke-width="2" marker-end="url(#ag)"/>
  <text x="648" y="80" font-size="10.5" font-weight="700" fill="#6FAE8B" text-anchor="middle">yes</text>
  <rect x="690" y="52" width="58" height="52" rx="3" fill="#1E4D33" stroke="#2F7E52"/>
  <text x="719" y="76" font-size="11" font-weight="600" fill="#eef3ef" text-anchor="middle">law</text>
  <text x="719" y="90" font-size="11" font-weight="600" fill="#eef3ef" text-anchor="middle">holds</text>

  <!-- no -->
  <path d="M600,164 C650,190 660,202 690,202" fill="none" stroke="#9c5342" stroke-width="2" marker-end="url(#ar)"/>
  <text x="648" y="204" font-size="10.5" font-weight="700" fill="#c07a68" text-anchor="middle">no</text>
  <rect x="642" y="176" width="106" height="52" rx="3" fill="#3a2019" stroke="#9c5342"/>
  <text x="695" y="199" font-size="10.5" font-weight="600" fill="#eaddd7" text-anchor="middle">defect found,</text>
  <text x="695" y="215" font-size="10.5" font-weight="600" fill="#eaddd7" text-anchor="middle">pinned forever</text>

  <text x="380" y="266" font-size="10.5" fill="#5d6f64" text-anchor="middle">on every generated workload, the optimized engine must equal the naive fixpoint of the logic program</text>
</svg>
