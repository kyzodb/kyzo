<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session creating an incident relation of summaries and embeddings and a references relation of which incident cites which runbook, each returning status OK.">
  <rect x="1" y="1" width="858" height="328" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · an agent's memory of past incidents, and the runbooks they cite</text>

  <text x="22" y="60"  font-size="12.5" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[id, summary, emb] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#c9d6cc">[</tspan></text>
  <text x="22" y="78"  font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">        [</tspan><tspan fill="#a9cf9e">'INC-204'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">'Redis pool exhausted under load'</tspan><tspan fill="#c9d6cc">,   [</tspan><tspan fill="#8fb5d6">0.90, 0.10</tspan><tspan fill="#c9d6cc">]],</tspan></text>
  <text x="22" y="96"  font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">        [</tspan><tspan fill="#a9cf9e">'INC-231'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">'Thread-pool saturation, p99 spike'</tspan><tspan fill="#c9d6cc">, [</tspan><tspan fill="#8fb5d6">0.85, 0.20</tspan><tspan fill="#c9d6cc">]],</tspan></text>
  <text x="22" y="114" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">        [</tspan><tspan fill="#a9cf9e">'INC-198'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">'Postgres replica lag on backfill'</tspan><tspan fill="#c9d6cc">,  [</tspan><tspan fill="#8fb5d6">0.15, 0.85</tspan><tspan fill="#c9d6cc">]],</tspan></text>
  <text x="22" y="132" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">        [</tspan><tspan fill="#a9cf9e">'INC-176'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">'Kafka consumer rebalance storm'</tspan><tspan fill="#c9d6cc">,   [</tspan><tspan fill="#8fb5d6">0.10, 0.90</tspan><tspan fill="#c9d6cc">]]</tspan></text>
  <text x="22" y="150" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">      ] </tspan><tspan fill="#5fc492">:create </tspan><tspan fill="#7fa6bf">incident </tspan><tspan fill="#c9d6cc">{id: </tspan><tspan fill="#7fa6bf">String </tspan><tspan fill="#5fc492">=&gt; </tspan><tspan fill="#c9d6cc">summary: </tspan><tspan fill="#7fa6bf">String</tspan><tspan fill="#c9d6cc">, emb: </tspan><tspan fill="#7fa6bf">&lt;F32; 2&gt;</tspan><tspan fill="#c9d6cc">}</tspan></text>
  <text x="22" y="168" font-size="12.5" fill="#7c8f83" xml:space="preserve"> status     OK</text>

  <text x="22" y="212" font-size="12.5" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[from, to] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#c9d6cc">[[</tspan><tspan fill="#a9cf9e">'INC-204','RB-pool-sizing'</tspan><tspan fill="#c9d6cc">],   [</tspan><tspan fill="#a9cf9e">'INC-231','RB-threadpool-tuning'</tspan><tspan fill="#c9d6cc">],</tspan></text>
  <text x="22" y="230" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">                    [</tspan><tspan fill="#a9cf9e">'INC-198','RB-replica-failover'</tspan><tspan fill="#c9d6cc">], [</tspan><tspan fill="#a9cf9e">'INC-176','RB-consumer-groups'</tspan><tspan fill="#c9d6cc">]]</tspan></text>
  <text x="22" y="248" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5fc492">:create </tspan><tspan fill="#7fa6bf">references </tspan><tspan fill="#c9d6cc">{from: </tspan><tspan fill="#7fa6bf">String</tspan><tspan fill="#c9d6cc">, to: </tspan><tspan fill="#7fa6bf">String</tspan><tspan fill="#c9d6cc">}</tspan></text>
  <text x="22" y="266" font-size="12.5" fill="#7c8f83" xml:space="preserve"> status     OK</text>

  <text x="22" y="306" font-size="11.5" fill="#6d8074" xml:space="preserve">two ordinary relations: one carries a vector memory, one is the citation graph</text>
</svg>
