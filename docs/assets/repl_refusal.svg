<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" width="860" height="240" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB query that exceeds its timeout budget returns a typed eval::limit_exceeded refusal.">
  <rect x="1" y="1" width="858" height="238" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · over budget: typed refusal - never a panic, never a wrong row</text>

  <text x="22" y="58" font-size="12" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">reach[r] </tspan><tspan fill="#5fc492">:= *</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: </tspan><tspan fill="#a9cf9e">'attacker'</tspan><tspan fill="#c9d6cc">, dst: r}</tspan></text>
  <text x="22" y="78" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">      reach[r] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[m], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: m, dst: r}</tspan></text>
  <text x="22" y="98" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">      ?[r] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[r] </tspan><tspan fill="#5fc492">:timeout </tspan><tspan fill="#8fb5d6">0.0000001</tspan></text>

  <text x="22" y="132" font-size="12" xml:space="preserve"><tspan fill="#9c5342">eval::limit_exceeded</tspan></text>
  <text x="22" y="154" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">query budget exceeded: deadline (ms) spent 0 of ceiling 0</tspan></text>
  <text x="22" y="176" font-size="12" xml:space="preserve"><tspan fill="#6d8074">help: raise the corresponding budget ceiling, or narrow the query</tspan></text>

  <text x="22" y="214" font-size="11" fill="#6d8074" xml:space="preserve">same facts + same budget -&gt; identical refusal; an error message is an interface</text>
</svg>
