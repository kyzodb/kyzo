<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" width="860" height="260" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="KyzoDB ::verify runs a recursive path query through the engine and the reference oracle; both agree.">
  <rect x="1" y="1" width="858" height="258" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · ask the engine to prove an answer against its own oracle</text>

  <text x="22" y="58" font-size="12" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5fc492">::verify </tspan><tspan fill="#c9d6cc">{</tspan></text>
  <text x="22" y="78" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">        path[x, y] </tspan><tspan fill="#5fc492">:= *</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">[x, y]</tspan></text>
  <text x="22" y="98" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">        path[x, z] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">path[x, y], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">[y, z]</tspan></text>
  <text x="22" y="118" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">        ?[x, y] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">path[x, y]</tspan></text>
  <text x="22" y="138" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">      }</tspan></text>

  <text x="22" y="170" font-size="11.5" fill="#7c8f83" xml:space="preserve"> status  | summary              | detail</text>
  <text x="22" y="186" font-size="11.5" fill="#35443b" xml:space="preserve">---------+----------------------+--------</text>
  <text x="22" y="206" font-size="11.5" xml:space="preserve"><tspan fill="#5fc492"> match   </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> 20 row(s) agree      </tspan><tspan fill="#35443b">|</tspan></text>

  <text x="22" y="240" font-size="11" fill="#6d8074" xml:space="preserve">optimized engine and naive oracle, same snapshot: match, refuse, or a reproducible mismatch</text>
</svg>
