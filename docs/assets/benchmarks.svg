<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 492" width="860" height="492" role="img" aria-label="KyzoDB benchmark panel: seven access patterns, each with a metric and its better-direction, a tinted KyzoDB value column, and a right-aligned Reference value column captioned with the named competitor (stitched stack, faiss/hnswlib, Tantivy, Souffle, Kuzu, SQLite). Every cell reads TBD until measured at the v0.9.0 tag.">
  <defs>
    <style>
      .sans { font-family: ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif; }
      .mono { font-family: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- instrument panel: dark ground, hairline edge, near-square, hard offset shadow -->
  <rect x="6" y="6" width="846" height="484" rx="3" fill="#0e140f"/>
  <rect x="2" y="2" width="846" height="484" rx="3" fill="#0c1310" stroke="#263229"/>
  <!-- fern joint: the single structural accent -->
  <rect x="2" y="2" width="3" height="484" fill="#2F7E52"/>

  <!-- KyzoDB column: the one column that is ours, marked by a faint fern wash -->
  <rect x="536" y="120" width="104" height="338" fill="#2F7E52" opacity="0.08"/>

  <text x="28" y="44" class="sans" font-size="21" font-weight="600" fill="#eef3ef">Benchmarks</text>
  <text x="28" y="66" class="sans" font-size="13" fill="#7c8f83">One engine, measured against the best in each category. Measured, never asserted.</text>

  <!-- column headers -->
  <text x="28"  y="106" class="mono" font-size="10.5" letter-spacing="0.8" fill="#5d6f64">ACCESS PATTERN</text>
  <text x="300" y="106" class="mono" font-size="10.5" letter-spacing="0.8" fill="#5d6f64">METRIC</text>
  <text x="628" y="106" class="mono" font-size="10.5" letter-spacing="0.8" fill="#6FAE8B" text-anchor="end">KYZODB</text>
  <text x="815" y="106" class="mono" font-size="10.5" letter-spacing="0.8" fill="#5d6f64" text-anchor="end">REFERENCE</text>
  <line x1="28" y1="116" x2="832" y2="116" stroke="#263229"/>

  <g>
    <!-- row 1 -->
    <text x="28"  y="150" class="sans" font-size="13.5" fill="#a9baaf">Cross-modal query, one snapshot</text>
    <text x="300" y="150" class="mono" font-size="11.5" fill="#7c8f83">p95 latency</text>
    <text x="490" y="150" class="mono" font-size="11.5" fill="#5d6f64">&#8595;</text>
    <text x="628" y="150" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="150" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="163" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">stitched stack</text>
    <line x1="28" y1="174" x2="832" y2="174" stroke="#223029"/>

    <!-- row 2 -->
    <text x="28"  y="198" class="sans" font-size="13.5" fill="#a9baaf">Approximate vector search</text>
    <text x="300" y="198" class="mono" font-size="11.5" fill="#7c8f83">Recall@10 · QPS</text>
    <text x="490" y="198" class="mono" font-size="11.5" fill="#5d6f64">&#8593;</text>
    <text x="628" y="198" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="198" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="211" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">faiss · hnswlib</text>
    <line x1="28" y1="222" x2="832" y2="222" stroke="#223029"/>

    <!-- row 3 -->
    <text x="28"  y="246" class="sans" font-size="13.5" fill="#a9baaf">Full-text &amp; hybrid retrieval</text>
    <text x="300" y="246" class="mono" font-size="11.5" fill="#7c8f83">queries/sec</text>
    <text x="490" y="246" class="mono" font-size="11.5" fill="#5d6f64">&#8593;</text>
    <text x="628" y="246" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="246" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="259" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">Tantivy</text>
    <line x1="28" y1="270" x2="832" y2="270" stroke="#223029"/>

    <!-- row 4 -->
    <text x="28"  y="294" class="sans" font-size="13.5" fill="#a9baaf">Recursive Datalog</text>
    <text x="300" y="294" class="mono" font-size="11.5" fill="#7c8f83">wall-clock</text>
    <text x="490" y="294" class="mono" font-size="11.5" fill="#5d6f64">&#8595;</text>
    <text x="628" y="294" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="294" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="307" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">Souffle</text>
    <line x1="28" y1="318" x2="832" y2="318" stroke="#223029"/>

    <!-- row 5 -->
    <text x="28"  y="342" class="sans" font-size="13.5" fill="#a9baaf">Whole-graph algorithms</text>
    <text x="300" y="342" class="mono" font-size="11.5" fill="#7c8f83">wall-clock</text>
    <text x="490" y="342" class="mono" font-size="11.5" fill="#5d6f64">&#8595;</text>
    <text x="628" y="342" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="342" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="355" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">Kùzu</text>
    <line x1="28" y1="366" x2="832" y2="366" stroke="#223029"/>

    <!-- row 6: the axis only we carry -->
    <text x="28"  y="390" class="sans" font-size="13.5" fill="#a9baaf">Time-travel as-of read</text>
    <text x="300" y="390" class="mono" font-size="11.5" fill="#7c8f83">vs. current read</text>
    <text x="628" y="390" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="390" class="mono" font-size="11" fill="#5d6f64" text-anchor="end">n/a</text>
    <text x="815" y="403" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">no equivalent</text>
    <line x1="28" y1="414" x2="832" y2="414" stroke="#223029"/>

    <!-- row 7 -->
    <text x="28"  y="438" class="sans" font-size="13.5" fill="#a9baaf">Embedded transactions</text>
    <text x="300" y="438" class="mono" font-size="11.5" fill="#7c8f83">ops/sec</text>
    <text x="490" y="438" class="mono" font-size="11.5" fill="#5d6f64">&#8593;</text>
    <text x="628" y="438" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="438" class="mono" font-size="11" fill="#5b7590" text-anchor="end">TBD</text>
    <text x="815" y="451" class="mono" font-size="9.5" fill="#5d6f64" text-anchor="end">SQLite</text>
  </g>

  <text x="28" y="474" class="mono" font-size="9.5" fill="#5d6f64">&#8593; higher is better   &#8595; lower is better   ·   every cell TBD until measured at the v0.9.0 tag</text>
</svg>
