<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="One KyzoDB program: vector-near live prod unclaimed incidents with runbooks, while attacker reach includes db-customers.">
  <rect x="1" y="1" width="858" height="358" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · near + live + unclaimed + runbook + attacker can reach the jewel</text>

  <text x="22" y="56" font-size="11.5" xml:space="preserve"><tspan fill="#5f7266"># $v is an incident embedding (illustrative); search hits unify like any relation</tspan></text>
  <text x="22" y="76" font-size="11.5" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">near[id, dist] </tspan><tspan fill="#5fc492">:= ~</tspan><tspan fill="#7fa6bf">incident:emb</tspan><tspan fill="#c9d6cc">{id </tspan><tspan fill="#5fc492">| </tspan><tspan fill="#c9d6cc">query: </tspan><tspan fill="#d6ca8a">vec</tspan><tspan fill="#c9d6cc">($v), k: </tspan><tspan fill="#8fb5d6">5</tspan><tspan fill="#c9d6cc">, bind_distance: dist}</tspan></text>
  <text x="22" y="96" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">      reach[r] </tspan><tspan fill="#5fc492">:= *</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: </tspan><tspan fill="#a9cf9e">'attacker'</tspan><tspan fill="#c9d6cc">, dst: r}</tspan></text>
  <text x="22" y="116" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">      reach[r] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[m], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: m, dst: r}</tspan></text>
  <text x="22" y="136" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">      ?[id, summary, rb, dist] </tspan><tspan fill="#5fc492">:=</tspan></text>
  <text x="22" y="156" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">          near[id, dist], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">incident</tspan><tspan fill="#c9d6cc">{id, summary, live: </tspan><tspan fill="#8fb5d6">true</tspan><tspan fill="#c9d6cc">, env: </tspan><tspan fill="#a9cf9e">'prod'</tspan><tspan fill="#c9d6cc">},</tspan></text>
  <text x="22" y="176" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">cites</tspan><tspan fill="#c9d6cc">{inc: id, rb}, </tspan><tspan fill="#5fc492">not *</tspan><tspan fill="#7fa6bf">claim</tspan><tspan fill="#c9d6cc">{subject: id},</tspan></text>
  <text x="22" y="196" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">          reach[jewel], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">service</tspan><tspan fill="#c9d6cc">{id: jewel, critical: </tspan><tspan fill="#8fb5d6">true</tspan><tspan fill="#c9d6cc">}, jewel </tspan><tspan fill="#5fc492">== </tspan><tspan fill="#a9cf9e">'db-customers'</tspan></text>
  <text x="22" y="216" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc">      :order dist</tspan></text>

  <text x="22" y="246" font-size="11" fill="#7c8f83" xml:space="preserve"> id        | summary                              | rb                 | dist</text>
  <text x="22" y="262" font-size="11" fill="#35443b" xml:space="preserve">-----------+--------------------------------------+--------------------+--------</text>
  <text x="22" y="282" font-size="11" xml:space="preserve"><tspan fill="#c9d6cc"> INC-pool2 </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> Connection pool saturation in redis </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> RB-pool-sizing    </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> 0.0018</tspan></text>
  <text x="22" y="302" font-size="11" xml:space="preserve"><tspan fill="#c9d6cc"> INC-rare  </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> Rare prod-only redis failover flap  </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> RB-redis-failover </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> 0.0078</tspan></text>

  <text x="22" y="334" font-size="11" fill="#6d8074" xml:space="preserve">INC-pool dropped (already claimed). Unclaimed near-misses with runbooks, and the jewel is reachable - one snapshot.</text>
</svg>
