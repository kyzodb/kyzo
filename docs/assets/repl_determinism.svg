<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="Same KyzoDB reach query hashed identical under 1 and 32 Rayon threads.">
  <rect x="1" y="1" width="858" height="218" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · same facts, same query - same answer bytes at any thread count</text>

  <text x="22" y="60" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">reach[r] </tspan><tspan fill="#5fc492">:= *</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: </tspan><tspan fill="#a9cf9e">'attacker'</tspan><tspan fill="#c9d6cc">, dst: r}</tspan></text>
  <text x="22" y="80" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">reach[r] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[m], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">can_access</tspan><tspan fill="#c9d6cc">{src: m, dst: r}</tspan></text>
  <text x="22" y="100" font-size="12" xml:space="preserve"><tspan fill="#c9d6cc">?[resource] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[resource] :order resource</tspan></text>

  <text x="22" y="136" font-size="12" xml:space="preserve"><tspan fill="#7c8f83">RAYON_NUM_THREADS=1  </tspan><tspan fill="#c9d6cc">row_hash </tspan><tspan fill="#5fc492">= </tspan><tspan fill="#a9cf9e">6a372a7ebf2d436f</tspan></text>
  <text x="22" y="158" font-size="12" xml:space="preserve"><tspan fill="#7c8f83">RAYON_NUM_THREADS=32 </tspan><tspan fill="#c9d6cc">row_hash </tspan><tspan fill="#5fc492">= </tspan><tspan fill="#a9cf9e">6a372a7ebf2d436f</tspan></text>
  <text x="22" y="186" font-size="12" xml:space="preserve"><tspan fill="#5fc492">match</tspan></text>

  <text x="200" y="186" font-size="11" fill="#6d8074" xml:space="preserve">a query is a test: CI can pin the hash forever</text>
</svg>
