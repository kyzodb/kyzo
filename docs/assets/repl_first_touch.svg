<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="After installing the kyzo binary: create two relations and join them in one KyzoScript query.">
  <rect x="1" y="1" width="858" height="298" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · thirty seconds after install: a join is shared variables, not JOIN</text>

  <text x="22" y="58" font-size="12" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[inc, rb] &lt;- [['INC-204','RB-pool'],['INC-231','RB-threads']] </tspan><tspan fill="#5fc492">:create </tspan><tspan fill="#7fa6bf">cites </tspan><tspan fill="#c9d6cc">{inc, rb}</tspan></text>
  <text x="22" y="78" font-size="12" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[id, title] &lt;- [['RB-pool','Resize redis pools'],['RB-threads','Tune thread pools']] </tspan><tspan fill="#5fc492">:create </tspan><tspan fill="#7fa6bf">runbook </tspan><tspan fill="#c9d6cc">{id =&gt; title}</tspan></text>
  <text x="22" y="98" font-size="12" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[inc, title] </tspan><tspan fill="#5fc492">:= *</tspan><tspan fill="#7fa6bf">cites</tspan><tspan fill="#c9d6cc">{inc, rb}, </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">runbook</tspan><tspan fill="#c9d6cc">{id: rb, title}</tspan></text>

  <text x="22" y="130" font-size="11.5" fill="#7c8f83" xml:space="preserve"> inc     | title</text>
  <text x="22" y="146" font-size="11.5" fill="#35443b" xml:space="preserve">---------+----------------------</text>
  <text x="22" y="166" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc"> INC-204 </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> Resize redis pools</tspan></text>
  <text x="22" y="186" font-size="11.5" xml:space="preserve"><tspan fill="#c9d6cc"> INC-231 </tspan><tspan fill="#35443b">|</tspan><tspan fill="#c9d6cc"> Tune thread pools</tspan></text>

  <text x="22" y="220" font-size="12" xml:space="preserve"><tspan fill="#5f7266"># same shape scales: swap *cites for ~incident:emb{...} and the hit is still a relation</tspan></text>
  <text x="22" y="272" font-size="11" fill="#6d8074" xml:space="preserve">download binary -&gt; type three lines -&gt; rows. no server required for the embedded path either.</text>
</svg>
