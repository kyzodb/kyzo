<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" width="860" height="260" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session creating an HNSW vector index, a full-text index, and a MinHash-LSH near-duplicate index over the same incident relation, each returning status OK.">
  <rect x="1" y="1" width="858" height="258" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · index that one memory three ways: vector, full-text, near-duplicate</text>

  <text x="22" y="62"  font-size="11" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5fc492">::</tspan><tspan fill="#d6ca8a">hnsw create </tspan><tspan fill="#7fa6bf">incident:emb </tspan><tspan fill="#c9d6cc">{fields: [emb], dim: </tspan><tspan fill="#8fb5d6">2</tspan><tspan fill="#c9d6cc">, m: </tspan><tspan fill="#8fb5d6">16</tspan><tspan fill="#c9d6cc">, ef_construction: </tspan><tspan fill="#8fb5d6">32</tspan><tspan fill="#c9d6cc">, distance: </tspan><tspan fill="#7fa6bf">L2</tspan><tspan fill="#c9d6cc">}</tspan></text>
  <text x="22" y="80"  font-size="11" fill="#7c8f83" xml:space="preserve"> status    OK</text>

  <text x="22" y="120" font-size="11" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5fc492">::</tspan><tspan fill="#d6ca8a">fts create </tspan><tspan fill="#7fa6bf">incident:txt </tspan><tspan fill="#c9d6cc">{extractor: summary, tokenizer: </tspan><tspan fill="#7fa6bf">Simple</tspan><tspan fill="#c9d6cc">}</tspan></text>
  <text x="22" y="138" font-size="11" fill="#7c8f83" xml:space="preserve"> status    OK</text>

  <text x="22" y="178" font-size="11" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5fc492">::</tspan><tspan fill="#d6ca8a">lsh create </tspan><tspan fill="#7fa6bf">incident:sim </tspan><tspan fill="#c9d6cc">{extractor: summary, tokenizer: </tspan><tspan fill="#7fa6bf">Simple</tspan><tspan fill="#c9d6cc">, n_gram: </tspan><tspan fill="#8fb5d6">3</tspan><tspan fill="#c9d6cc">, target_threshold: </tspan><tspan fill="#8fb5d6">0.5</tspan><tspan fill="#c9d6cc">}</tspan></text>
  <text x="22" y="196" font-size="11" fill="#7c8f83" xml:space="preserve"> status    OK</text>

  <text x="22" y="238" font-size="11.5" fill="#6d8074" xml:space="preserve">dense, sparse-text, and near-duplicate recall, all over one ordered store</text>
</svg>
