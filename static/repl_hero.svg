<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 296" width="860" height="296" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB query: a recursive graph reach, a semantic vector search restricted to that reach, and a provenance join, all evaluated at one past instant.">
  <rect x="1" y="1" width="858" height="294" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · one query across graph, vectors, provenance and time</text>

  <text x="22" y="62"  font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5f7266"># everything reachable from the account, per the graph</tspan></text>
  <text x="22" y="82"  font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      reach[e] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">{from: </tspan><tspan fill="#a9cf9e">'acme'</tspan><tspan fill="#c9d6cc">, to: e}</tspan></text>
  <text x="22" y="102" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      reach[e] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">reach[m], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">{from: m, to: e}</tspan></text>

  <text x="22" y="134" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5f7266"># semantic neighbours of the question, restricted to that reach,</tspan></text>
  <text x="22" y="154" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5f7266"># with their evidence, as the record stood on March 3rd</tspan></text>
  <text x="22" y="174" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      ?[claim, evidence] </tspan><tspan fill="#5fc492">:=</tspan></text>
  <text x="22" y="194" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">~</tspan><tspan fill="#7fa6bf">claims:semantic</tspan><tspan fill="#c9d6cc">{claim, entity </tspan><tspan fill="#5fc492">| </tspan><tspan fill="#c9d6cc">query: </tspan><tspan fill="#d6ca8a">$q</tspan><tspan fill="#c9d6cc">, k: </tspan><tspan fill="#8fb5d6">8</tspan><tspan fill="#c9d6cc">},</tspan></text>
  <text x="22" y="214" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          reach[entity],</tspan></text>
  <text x="22" y="234" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">provenance</tspan><tspan fill="#c9d6cc">{claim, evidence </tspan><tspan fill="#5fc492">@ </tspan><tspan fill="#a9cf9e">'2026-03-03T00:00:00Z'</tspan><tspan fill="#c9d6cc">}</tspan></text>

  <line x1="22" y1="256" x2="838" y2="256" stroke="#1b2620"/>
  <text x="22" y="280" font-size="11.5" fill="#6d8074" xml:space="preserve">one language, one snapshot: one answer, or one typed refusal naming what it hit</text>
</svg>
