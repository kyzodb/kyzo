<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB clinical-safety query: interaction-graph recursion finds the risky drugs, a semantic vector search of adverse events is restricted to them, and each event's evidence is read as the record stood at admission, all in one query.">
  <rect x="1" y="1" width="858" height="298" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · one query across vectors, an interaction graph, evidence, and time</text>

  <text x="22" y="60"  font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#5f7266"># the patient's drugs, plus everything they interact with</tspan></text>
  <text x="22" y="80"  font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      risky[d] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">active_rx</tspan><tspan fill="#c9d6cc">{patient: </tspan><tspan fill="#a9cf9e">'P-4821'</tspan><tspan fill="#c9d6cc">, drug: d}</tspan></text>
  <text x="22" y="100" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      risky[d] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#c9d6cc">risky[m], </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">interacts</tspan><tspan fill="#c9d6cc">{drug: m, other: d}</tspan></text>

  <text x="22" y="132" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5f7266"># adverse events like the presenting symptom, restricted to those drugs,</tspan></text>
  <text x="22" y="152" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5f7266"># with the evidence exactly as the record stood at admission</tspan></text>
  <text x="22" y="172" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      ?[event, drug, source] </tspan><tspan fill="#5fc492">:=</tspan></text>
  <text x="22" y="192" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">~</tspan><tspan fill="#7fa6bf">adverse:emb</tspan><tspan fill="#c9d6cc">{event, drug </tspan><tspan fill="#5fc492">| </tspan><tspan fill="#c9d6cc">query: </tspan><tspan fill="#d6ca8a">vec</tspan><tspan fill="#c9d6cc">([</tspan><tspan fill="#8fb5d6">0.22, 0.90</tspan><tspan fill="#c9d6cc">]), k: </tspan><tspan fill="#8fb5d6">8</tspan><tspan fill="#c9d6cc">},</tspan></text>
  <text x="22" y="212" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          risky[drug],</tspan></text>
  <text x="22" y="232" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">evidence</tspan><tspan fill="#c9d6cc">{event, source </tspan><tspan fill="#5fc492">@ </tspan><tspan fill="#a9cf9e">'2026-03-03T00:00:00Z'</tspan><tspan fill="#c9d6cc">}</tspan></text>

  <line x1="22" y1="256" x2="838" y2="256" stroke="#1b2620"/>
  <text x="22" y="282" font-size="11.5" fill="#6d8074" xml:space="preserve">one language, one snapshot: one grounded answer, or one typed refusal naming what it hit</text>
</svg>
