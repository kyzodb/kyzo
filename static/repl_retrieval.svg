<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 250" width="860" height="250" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session: a nearest-neighbour vector search joined to the cites graph, returning datalog and graph-db.">
  <rect x="1" y="1" width="858" height="248" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · nearest-neighbour search, joined straight to the graph</text>

  <text x="22" y="66" font-size="13.5" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[hit, title, cited] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#5fc492">~</tspan><tspan fill="#7fa6bf">doc:emb</tspan><tspan fill="#c9d6cc">{id: hit, title </tspan><tspan fill="#5fc492">| </tspan><tspan fill="#c9d6cc">query: q, k: </tspan><tspan fill="#8fb5d6">2</tspan><tspan fill="#c9d6cc">, ef: </tspan><tspan fill="#8fb5d6">20</tspan><tspan fill="#c9d6cc">},</tspan></text>
  <text x="22" y="88" font-size="13.5" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">cites</tspan><tspan fill="#c9d6cc">{from: hit, to: cited},</tspan></text>
  <text x="22" y="110" font-size="13.5" xml:space="preserve"><tspan fill="#c9d6cc">      q = </tspan><tspan fill="#d6ca8a">vec</tspan><tspan fill="#c9d6cc">([</tspan><tspan fill="#8fb5d6">0.12, 0.88</tspan><tspan fill="#c9d6cc">])</tspan></text>

  <text x="22" y="150" font-size="13.5" fill="#7c8f83" xml:space="preserve"> hit       │ title                  │ cited</text>
  <text x="22" y="168" font-size="13.5" fill="#35443b" xml:space="preserve">───────────┼────────────────────────┼──────────</text>
  <text x="22" y="190" font-size="13.5" xml:space="preserve"><tspan fill="#c9d6cc"> datalog   </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> Datalog and recursion  </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> graph-db</tspan></text>
  <text x="22" y="212" font-size="13.5" xml:space="preserve"><tspan fill="#c9d6cc"> graph-db  </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> Graph databases        </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> mvcc</tspan></text>

  <text x="22" y="238" font-size="11.5" xml:space="preserve"><tspan fill="#5f7266">(2 rows)</tspan><tspan fill="#6d8074">   semantic recall and a graph hop, one query, one snapshot</tspan></text>
</svg>
