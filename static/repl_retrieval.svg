<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 268" width="860" height="268" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session: a nearest-neighbour search over incident memories, joined to the references graph, returns INC-204 and its runbook RB-pool-sizing and INC-231 and RB-threadpool-tuning.">
  <rect x="1" y="1" width="858" height="266" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · recall incidents like this alert, then follow to the runbooks they cite</text>

  <text x="22" y="60"  font-size="12.5" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">?[hit, summary, runbook] </tspan><tspan fill="#5fc492">:= </tspan><tspan fill="#5fc492">~</tspan><tspan fill="#7fa6bf">incident:emb</tspan><tspan fill="#c9d6cc">{id: hit </tspan><tspan fill="#5fc492">| </tspan><tspan fill="#c9d6cc">query: </tspan><tspan fill="#d6ca8a">vec</tspan><tspan fill="#c9d6cc">([</tspan><tspan fill="#8fb5d6">0.88, 0.12</tspan><tspan fill="#c9d6cc">]), k: </tspan><tspan fill="#8fb5d6">2</tspan><tspan fill="#c9d6cc">},</tspan></text>
  <text x="22" y="80"  font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">incident</tspan><tspan fill="#c9d6cc">{id: hit, summary},</tspan></text>
  <text x="22" y="100" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">          </tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">references</tspan><tspan fill="#c9d6cc">{from: hit, to: runbook}</tspan></text>

  <text x="22" y="140" font-size="12.5" fill="#7c8f83" xml:space="preserve"> hit     │ summary                            │ runbook</text>
  <text x="22" y="158" font-size="12.5" fill="#35443b" xml:space="preserve">─────────┼────────────────────────────────────┼──────────────────────</text>
  <text x="22" y="180" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc"> INC-204 </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> Redis pool exhausted under load    </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> RB-pool-sizing</tspan></text>
  <text x="22" y="202" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc"> INC-231 </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> Thread-pool saturation, p99 spike  </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> RB-threadpool-tuning</tspan></text>

  <text x="22" y="244" font-size="11.5" xml:space="preserve"><tspan fill="#5f7266">(2 rows)</tspan><tspan fill="#6d8074">   semantic recall and a graph hop: one query, one snapshot, no fan-out</tspan></text>
</svg>
