<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 276" width="860" height="276" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session: the built-in ShortestPathDijkstra rule returns the cheapest privilege-escalation path from svc-ci-deploy to db-customers at cost 4.">
  <rect x="1" y="1" width="858" height="274" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · a whole-graph algorithm as a built-in rule over your access graph</text>

  <text x="22" y="66" font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">kyzo&gt; </tspan><tspan fill="#c9d6cc">start[] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#c9d6cc">[[</tspan><tspan fill="#a9cf9e">'svc-ci-deploy'</tspan><tspan fill="#c9d6cc">]]</tspan></text>
  <text x="22" y="88" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      end[]   </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#c9d6cc">[[</tspan><tspan fill="#a9cf9e">'db-customers'</tspan><tspan fill="#c9d6cc">]]</tspan></text>
  <text x="22" y="110" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      ?[src, dst, cost, path] </tspan><tspan fill="#5fc492">&lt;~ </tspan><tspan fill="#d6ca8a">ShortestPathDijkstra</tspan><tspan fill="#c9d6cc">(</tspan><tspan fill="#5fc492">*</tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">[], start[], end[])</tspan></text>

  <text x="22" y="150" font-size="13" fill="#7c8f83" xml:space="preserve"> src           │ dst          │ cost</text>
  <text x="22" y="168" font-size="13" fill="#35443b" xml:space="preserve">───────────────┼──────────────┼──────</text>
  <text x="22" y="190" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc"> svc-ci-deploy </tspan><tspan fill="#35443b">│</tspan><tspan fill="#c9d6cc"> db-customers </tspan><tspan fill="#35443b">│</tspan><tspan fill="#8fb5d6">    4 </tspan></text>

  <text x="22" y="224" font-size="12.5" xml:space="preserve"><tspan fill="#7c8f83"> path   </tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">"svc-ci-deploy"</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">"role-deploy"</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">"s3-artifacts"</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">"role-prod-ro"</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#a9cf9e">"db-customers"</tspan><tspan fill="#c9d6cc">]</tspan></text>

  <text x="22" y="258" font-size="11.5" xml:space="preserve"><tspan fill="#5f7266">(1 row)</tspan><tspan fill="#6d8074">   the shortest lateral-movement route, computed where the data lives</tspan></text>
</svg>
