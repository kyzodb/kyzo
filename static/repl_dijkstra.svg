<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 244" width="860" height="244" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB REPL session: the built-in ShortestPathDijkstra rule over a route relation returns the FRA to YPO path at distance 7660.">
  <rect x="1" y="1" width="858" height="242" rx="12" fill="#0E1512" stroke="#26302A"/>
  <path d="M1,13 A12,12 0 0 1 13,1 L847,1 A12,12 0 0 1 859,13 L859,34 L1,34 Z" fill="#161D18"/>
  <circle cx="22" cy="18" r="5.5" fill="#E06C75"/>
  <circle cx="41" cy="18" r="5.5" fill="#E5C07B"/>
  <circle cx="60" cy="18" r="5.5" fill="#98C379"/>
  <text x="430" y="22" text-anchor="middle" font-size="11.5" fill="#5C6B62">kyzo · a whole-graph algorithm as a built-in rule over your relations</text>

  <text x="22" y="66" font-size="13.5" xml:space="preserve"><tspan fill="#98C379">kyzo&gt; </tspan><tspan fill="#61AFEF">start</tspan><tspan fill="#9AA5AD">[] </tspan><tspan fill="#56B6C2">&lt;- </tspan><tspan fill="#9AA5AD">[[</tspan><tspan fill="#D19A66">'FRA'</tspan><tspan fill="#9AA5AD">]]</tspan></text>
  <text x="22" y="88" font-size="13.5" xml:space="preserve"><tspan fill="#9AA5AD">      </tspan><tspan fill="#61AFEF">end</tspan><tspan fill="#9AA5AD">[]   </tspan><tspan fill="#56B6C2">&lt;- </tspan><tspan fill="#9AA5AD">[[</tspan><tspan fill="#D19A66">'YPO'</tspan><tspan fill="#9AA5AD">]]</tspan></text>
  <text x="22" y="110" font-size="13.5" xml:space="preserve"><tspan fill="#9AA5AD">      ?[src, dst, distance, path] </tspan><tspan fill="#56B6C2">&lt;~ </tspan><tspan fill="#E5C07B">ShortestPathDijkstra</tspan><tspan fill="#9AA5AD">(</tspan><tspan fill="#C678DD">*</tspan><tspan fill="#61AFEF">route</tspan><tspan fill="#9AA5AD">[], </tspan><tspan fill="#61AFEF">start</tspan><tspan fill="#9AA5AD">[], </tspan><tspan fill="#61AFEF">end</tspan><tspan fill="#9AA5AD">[])</tspan></text>

  <text x="22" y="150" font-size="13.5" fill="#7FA08C" xml:space="preserve"> src │ dst │ distance │ path</text>
  <text x="22" y="168" font-size="13.5" fill="#37463E" xml:space="preserve">─────┼─────┼──────────┼─────────────────────────────</text>
  <text x="22" y="190" font-size="13.5" xml:space="preserve"><tspan fill="#E5C07B"> FRA </tspan><tspan fill="#37463E">│</tspan><tspan fill="#E5C07B"> YPO </tspan><tspan fill="#37463E">│</tspan><tspan fill="#D19A66">     7660 </tspan><tspan fill="#37463E">│</tspan><tspan fill="#C8CED4"> ["FRA","LHR","JFK","YPO"]</tspan></text>

  <text x="22" y="228" font-size="11.5" fill="#5C6B62" xml:space="preserve"><tspan fill="#4E5D54">(1 row)</tspan>   no export to a graph engine and back — it runs where the data lives</text>
</svg>
