<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" width="860" height="232" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB provenance proof tree: labeled[1,100] derived from path and tag, down to a ground edge, verified Ok by an independent checker.">
  <rect x="1" y="1" width="858" height="230" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
