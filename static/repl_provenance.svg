  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · why do you believe that? a proof, checked by an outsider</text>

  <text x="22" y="64"  font-size="13" xml:space="preserve"><tspan fill="#7fa6bf">labeled</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">1,100</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">1,4</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">tag</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">4,100</tspan><tspan fill="#c9d6cc">]</tspan></text>
  <text x="22" y="86"  font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">  </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">1,4</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">1,2</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">2,4</tspan><tspan fill="#c9d6cc">]</tspan></text>
  <text x="22" y="108" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">    </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">2,4</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">2,3</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">3,4</tspan><tspan fill="#c9d6cc">]</tspan></text>
  <text x="22" y="130" font-size="13" xml:space="preserve"><tspan fill="#c9d6cc">      </tspan><tspan fill="#7fa6bf">path</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">3,4</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">edge</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#8fb5d6">3,4</tspan><tspan fill="#c9d6cc">]   </tspan><tspan fill="#5f7266">(ground)</tspan></text>

  <text x="22" y="168" font-size="13" xml:space="preserve"><tspan fill="#7c8f83">checker verdict: </tspan><tspan fill="#6FAE8B" font-weight="600">Ok</tspan></text>

  <text x="22" y="210" font-size="11.5" fill="#6d8074" xml:space="preserve">re-derived from the rules and ground facts alone, by a checker that imports nothing from the evaluator</text>
