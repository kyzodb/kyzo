<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" width="860" height="232" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A KyzoDB provenance proof: swap SWAP-88421 must be centrally cleared under EMIR, derived from the trade, the clearing obligation, and the counterparty's gross notional exceeding the threshold, verified Ok by an independent checker.">
  <rect x="1" y="1" width="858" height="230" rx="3" fill="#0f1713" stroke="#26362d"/>
  <rect x="1" y="1" width="858" height="34" rx="3" fill="#161d18"/>
  <rect x="1" y="30" width="858" height="5" fill="#161d18"/>
  <circle cx="22" cy="18" r="5.5" fill="#9c5342"/>
  <circle cx="41" cy="18" r="5.5" fill="#d6ca8a"/>
  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">kyzo · must this swap be centrally cleared? a call an agent cannot get wrong</text>

  <text x="22" y="62"  font-size="12.5" xml:space="preserve"><tspan fill="#7fa6bf">must_clear</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'SWAP-88421'</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">otc_derivative</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'SWAP-88421'</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">mandated</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'IRS'</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">over_threshold</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'Acme-Capital'</tspan><tspan fill="#c9d6cc">]</tspan></text>
  <text x="22" y="84"  font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">  </tspan><tspan fill="#7fa6bf">otc_derivative</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'SWAP-88421'</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">trade</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'SWAP-88421', 'IRS'</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">executed_off_venue</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'SWAP-88421'</tspan><tspan fill="#c9d6cc">]   </tspan><tspan fill="#5f7266">(ground)</tspan></text>
  <text x="22" y="106" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">  </tspan><tspan fill="#7fa6bf">mandated</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'IRS'</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">clearing_obligation</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'EMIR-Art-4', 'IRS'</tspan><tspan fill="#c9d6cc">]   </tspan><tspan fill="#5f7266">(ground)</tspan></text>
  <text x="22" y="128" font-size="12.5" xml:space="preserve"><tspan fill="#c9d6cc">  </tspan><tspan fill="#7fa6bf">over_threshold</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'Acme-Capital'</tspan><tspan fill="#c9d6cc">] </tspan><tspan fill="#5fc492">&lt;- </tspan><tspan fill="#7fa6bf">gross_notional</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'Acme-Capital'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#8fb5d6">€8.2bn</tspan><tspan fill="#c9d6cc">], </tspan><tspan fill="#7fa6bf">threshold</tspan><tspan fill="#c9d6cc">[</tspan><tspan fill="#a9cf9e">'IRS'</tspan><tspan fill="#c9d6cc">, </tspan><tspan fill="#8fb5d6">€3.0bn</tspan><tspan fill="#c9d6cc">]   </tspan><tspan fill="#5f7266">(ground)</tspan></text>

  <text x="22" y="166" font-size="12.5" xml:space="preserve"><tspan fill="#7c8f83">checker verdict: </tspan><tspan fill="#6FAE8B" font-weight="600">Ok</tspan></text>

  <text x="22" y="208" font-size="11.5" fill="#6d8074" xml:space="preserve">every leaf is a stored fact; re-derived by a checker that imports nothing from the evaluator</text>
</svg>
