# cargo-deny configuration for KyzoDB.
# Enforced in CI (see .github/workflows/ci.yml). Three roles:
#   1. bans      — the base's C/C++ storage backends can never return, and the fjall
#                  backend decision can only be re-opened by editing this file (an
#                  explicit, reviewable act), never by silently swapping a dependency.
#   2. licenses  — MPL-2.0-compatible allow-list.
#   3. advisories — RustSec vulnerability scanning (the cargo-audit role).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # fxhash is unmaintained (advisory-class: unmaintained, not a vulnerability).
  # It is reached only through the deliberate jieba-rs =0.7.0 purity pin (the
  # FTS tokenizer tier; see kyzo-core/Cargo.toml). Accepted knowingly; the
  # revisit — pure-Rust jieba alternatives — is recorded on issue #18.
  "RUSTSEC-2025-0057",
  # bincode 1.x is unmaintained (same advisory class, not a vulnerability).
  # It is a build-dependency of fast2s 0.3.1 (the FTS tier's pure-Rust
  # traditional→simplified Chinese converter); 0.3.1 is the latest fast2s
  # and no version drops it. Accepted with the same revisit as fxhash:
  # issue #18's dependency-hygiene triage of the FTS tokenizer tier.
  "RUSTSEC-2025-0141",
]

[licenses]
version = 2
# Exactly the licenses the current tree requires — an unused allowance is
# cruft, and adding one is the visible act this gate exists to force.
allow = [
  "MPL-2.0",
  "MIT",
  "Apache-2.0",
  "ISC",         # is_ci
  "Unicode-3.0", # unicode-ident
  "0BSD",        # varint-rs (fjall dep) — public-domain-equivalent
  "BSL-1.0",     # xxhash-rust (fjall dep) — permissive, MPL-compatible
  "BSD-2-Clause", # cedarwood (jieba-rs's double-array trie) — permissive, MPL-compatible
]

[bans]
multiple-versions = "warn"
deny = [
  # The base's storage backends: removing these is the point of the fork (REFACTOR.md §1).
  { crate = "cozorocks", reason = "CozoDB's C++ RocksDB bridge; its removal is the point of KyzoDB" },
  { crate = "librocksdb-sys", reason = "RocksDB is C++; banned from the whole workspace" },
  { crate = "rocksdb", reason = "RocksDB is C++; banned from the whole workspace" },
  { crate = "sqlite3-src", reason = "SQLite is C; banned from the whole workspace" },
  { crate = "libsqlite3-sys", reason = "SQLite is C; banned from the whole workspace" },
  { crate = "rusqlite", reason = "SQLite is C; banned from the whole workspace" },
  # The rejected pure-Rust backends: fjall is the decided KV backend (REFACTOR.md §2).
  # Re-opening that decision means editing this file, visibly, not swapping a crate quietly.
  { crate = "redb", reason = "single-writer B-tree; re-imposes the one-writer wall fjall was chosen to escape" },
  { crate = "sled", reason = "stalled and unstable; rejected in the backend decision" },
]
