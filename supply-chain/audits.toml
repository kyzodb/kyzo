
# cargo-vet audits file

[[audits.endian-type]]
who = "Kyle Tobin <tobin.kyle@gmail.com>"
criteria = "safe-to-deploy"
version = "0.1.2"
notes = "Manually read the entire crate (single ~150-line lib.rs). Provides BigEndian<T>/LittleEndian<T> byte-order wrapper types via declarative macros. Two unsafe blocks do raw pointer reinterpretation for from_bytes/as_bytes with a debug_assert length check; a possible alignment-UB edge case exists on exotic platforms for multi-byte T, but there is no attacker-controlled code execution, no I/O, no build.rs, no macros beyond macro_rules!. Used internally by radix_trie for trie-key nibbling, not exposed to arbitrary untrusted byte slices in a way that creates an exploitable vulnerability."

[[audits.quadrature]]
who = "Kyle Tobin <tobin.kyle@gmail.com>"
criteria = "safe-to-deploy"
version = "0.1.2"
notes = "Manually read the entire crate (344 lines across lib.rs + double_exponential/mod.rs + clenshaw_curtis/mod.rs, plus constants.rs data tables). Pure numerical-integration algorithms (ports of a public-domain C++ implementation by John D. Cook), zero unsafe, zero dependencies, no I/O/env/fs/net access, all loops bounded by fixed-size weight tables (hard 350/257 evaluation caps documented and enforced structurally). Author Eh2406 (Jacob Finkelman) is a well-known rust-lang cargo team member."

[[audits.winapi-i686-pc-windows-gnu]]
who = "Kyle Tobin <tobin.kyle@gmail.com>"
criteria = "safe-to-deploy"
version = "0.4.0"
notes = "Manually inspected: build.rs only adds a rustc-link-search path when TARGET matches this crate's own arch/windows-gnu triple (inert on our Linux CI); src/lib.rs is a single #![no_std] marker line; the payload is ~1387 tiny MinGW dlltool-generated .a import-stub archives (standard doncb*.o trampoline objects, auto-generated non-executable linker metadata for Windows system DLLs), unchanged since 2018. This is the well-known winapi-rs bundled-import-library mechanism (retep998, already trusted above as winapi's maintainer); nothing here executes at build or link time outside the windows-gnu target."

