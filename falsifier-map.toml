# The falsifier map (story #322): the committed rule -> falsifier ->
# implementation artifact, seeded from the 35-item inventory in #322's
# Context (five lie-sources: INPUTS, CODE, MEANING, CLAIMS, GUARDIANS).
#
# `cargo xtask falsifier-map` (and the `gate` verb) checks this file:
#   - status = "implemented" entries MUST carry a non-empty `implementation`
#     pointer, and the file/directory that pointer names MUST exist in the
#     tree right now (a probe referencing a dead path goes red — the same
#     law CI's memcmp-invariant job already applies to itself).
#   - status = "gap" or "retired" entries MUST carry a non-empty `note`
#     explaining why (a citation, same law as an allowlist waiver). They MAY
#     also carry an `implementation` pointer citing partial, real coverage
#     (e.g. "the parser leg is fuzzed, the server leg is not") — if present
#     it is validated to exist exactly like an implemented entry's; a gap
#     may show its work, but never point at nothing.
#   - exactly 35 entries, unique `id`s, every `lie_source` one of the five
#     named classes.
#
# This is how the map's own ceiling is met on day one: gaps are not
# omitted, they are named, typed, and visible in the map's first commit.

[[falsifier]]
id = "inputs-c-toolchain-crate"
lie_source = "inputs"
rule = "No C/C++ toolchain crate enters any first-party dependency tree."
falsifier = "A `-sys` crate or a named C/C++-toolchain crate appears in kyzo/kyzo-bin's resolved dependency tree."
status = "implemented"
implementation = "scripts/check-pure-rust.sh"

[[falsifier]]
id = "inputs-vulnerable-unsound-dep"
lie_source = "inputs"
rule = "No dependency in the tree carries a known RustSec vulnerability or unsound advisory the workspace has not explicitly, narrowly accepted."
falsifier = "cargo-deny's advisories check finds an un-ignored RUSTSEC advisory."
status = "implemented"
implementation = "deny.toml"

[[falsifier]]
id = "inputs-egress-capable-crate"
lie_source = "inputs"
rule = "kyzo-core carries no dependency capable of independent network egress."
falsifier = "A crate with socket/HTTP-client capability appears in kyzo-core's dependency tree."
status = "gap"
note = "No mechanical egress-capability check exists yet. cargo-deny's `bans` list forbids specific backends, not the general class of egress-capable crates; scripts/check-pure-rust.sh checks toolchain purity, not network capability."

