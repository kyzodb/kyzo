status = "retired"
note = "A percentage coverage floor measures execution, not assertion (a line can run under a test that asserts nothing and still count covered) — see .github/workflows/ci.yml's own note on this decision (story #321, pre-commitment c). Retired in favor of mutation testing of the enforcement harness (epic #192, story #310), which is not yet built — see the `guardians-mutation-testing` entry below."

