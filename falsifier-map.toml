[[falsifier]]
id = "inputs-license-lineage"
lie_source = "inputs"
rule = "Every file's license matches LICENSING.md's path map, for both the MPL-2.0 engine lineage and the BSL-1.1 agent-tooling lineage."
falsifier = "A tracked .rs file outside vendor/ is missing its Mozilla Public License header (MPL half); or a .claude/ file carries an MPL header it must not (BSL half)."
status = "gap"
implementation = "scripts/check-mpl-headers.sh"
note = "The MPL half is mechanically enforced (scripts/check-mpl-headers.sh, run in CI's mpl-headers job). The BSL half — that .claude/ carries no MPL header (CLAUDE.md law 50) — has no mechanical check yet; marked as a gap rather than claiming full coverage under one implemented pointer."

