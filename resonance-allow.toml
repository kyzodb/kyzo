citation = "Issue #89's ruling: the three REFERENCE-tier copies of this classification (query/laws.rs, query/provenance.rs, query/trials.rs -- they judge the engine, never each other) are consolidated into one shared query/laws.rs::head_classes, pub(crate), consumed by provenance.rs and trials.rs; likewise unify/ground/Bindings, and trials.rs::check_unify (drift, not a genuine second algorithm -- it never independently judged unify itself) folded into the same shared unify. The pairs that remain, and must remain, unwaived-but-cited: query/stratify.rs::aggregation_character is the ENGINE's copy, deliberately hand-maintained independent of the oracle's head_classes -- the refusal-corpus differential (the_oracle_refusal_corpus_is_refused, stratify.rs) is only meaningful because the engine's stratifiability boundary and the oracle's are two separately-authored implementations that happen to agree; sharing this one would collapse that differential into a tautology. Likewise query/incremental.rs's whole IVM surface (unify, collect_candidates, contribute_candidates_subset, body_bindings_from, eval_aggregating_head_incremental) is an INDEPENDENTLY-WRITTEN twin of laws.rs's incremental_eval by its own module doc: 'never a shared import ... so a bug cannot hide behind one implementation covering for the other', with the transitive proof chain (production == oracle incremental == naive recompute) resting on that independence. See the doc comment at aggregation_character's definition (stratify.rs), incremental.rs's own module doc, and head_classes'/unify's definitions (laws.rs) for the full argument. A mutant that broke the shared unify (issue #89's verification) failed laws/provenance/trials together while stratify's and incremental's own suites stayed fully green, confirming this independence is real, not assumed. (Story #321: the head_classes closure line drifted from @750 to @766 since this entry was written; repointed, not re-worded.)"

