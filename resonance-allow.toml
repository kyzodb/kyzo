# ---------------------------------------------------------------------------
# check 2: panic-on-hostile-bytes lint
# ---------------------------------------------------------------------------
# Both entries below are `.expect(...)` calls that ARE reachable from a
# declared decode surface, but are provably safe by construction (the
# `expect` cannot fire given the code immediately above it) -- the same
# posture the story names for `RelationId::new`'s internal-mint assert:
# a programmer-error guard, documented, not a hostile-input refusal gap.

[[panic_lint]]
file = "crates/kyzo-core/src/data/memcmp.rs"
function = "decode_bytes"
line = 252
citation = "chunk.split_last().expect(\"chunk is non-empty\") at memcmp.rs:252: `chunk` comes from `data.get(offset..next_offset)` two lines above with `next_offset = offset + chunk_len` and `chunk_len = ENC_GROUP_SIZE + 1 >= 1`, so `chunk` is never empty when reached. The `.get` call already turns a too-short slice into the typed `bail!` above it; the `expect` only ever sees a chunk whose length was just constructed to be >= 1. Waived by exact line: any OTHER panic-shaped construct added later in this same function is a fresh violation, not covered by this waiver."

[[panic_lint]]
file = "crates/kyzo-core/src/data/tuple.rs"
function = "RelationId::raw_decode"
line = 328
citation = "bytes.try_into().expect(\"length checked\") at tuple.rs:328: `bytes` comes from `src.get(0..8)` immediately above (refused via typed `bail!` on `None`), so it is exactly 8 bytes when the `try_into::<[u8;8]>()` runs -- the same length-checked-just-above pattern as memcmp.rs's decode_bytes entry. Waived by exact line: any OTHER panic-shaped construct added later in this same function (the historical RelationId assert-on-decode shape, reintroduced) is a fresh violation, not covered by this waiver -- see the bite-proof."

